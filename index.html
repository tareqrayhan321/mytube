function loadYTScript() {
  return new Promise((resolve) => {
    if (window.YT && window.YT.Player) return resolve(window.YT);
    const tag = document.createElement("script");
    tag.src = "https://www.youtube.com/iframe_api";
    document.head.appendChild(tag);
    window.onYouTubeIframeAPIReady = () => resolve(window.YT);
  });
}

// ══════════════════════════════════════════════════════════
//  Extract YouTube Video ID from URL
// ══════════════════════════════════════════════════════════
function extractVideoId(input) {
  if (!input) return null;
  input = input.trim();
  // Already an ID (11 chars, no slash)
  if (/^[a-zA-Z0-9_-]{11}$/.test(input)) return input;
  try {
    const url = new URL(input);
    if (url.hostname.includes("youtu.be")) return url.pathname.slice(1).split("?")[0];
    if (url.hostname.includes("youtube.com")) {
      return url.searchParams.get("v") ||
        (url.pathname.startsWith("/shorts/") ? url.pathname.split("/shorts/")[1].split("?")[0] : null);
    }
  } catch {}
  // regex fallback
  const m = input.match(/(?:v=|youtu\.be\/|shorts\/)([a-zA-Z0-9_-]{11})/);
  return m ? m[1] : null;
}

// Format a YouTube API video item → our internal video object
function ytItemToVideo(item) {
  const id      = typeof item.id === "string" ? item.id : (item.id?.videoId || item.id?.playlistId || "");
  const snippet = item.snippet || {};
  const stats   = item.statistics || {};
  const thumb   = snippet.thumbnails?.medium?.url ||
                  snippet.thumbnails?.high?.url   ||
                  snippet.thumbnails?.default?.url ||
                  `https://i.ytimg.com/vi/${id}/mqdefault.jpg`;
  return {
    id,
    title:        snippet.title        || "Untitled",
    channel:      snippet.channelTitle || snippet.channelId || "Unknown",
    channelId:    snippet.channelId    || "",
    thumb,
    viewCount:    stats.viewCount    ? Number(stats.viewCount)    : null,
    likeCount:    stats.likeCount    ? Number(stats.likeCount)    : null,
    commentCount: stats.commentCount ? Number(stats.commentCount) : null,
    publishedAt:  snippet.publishedAt  || "",
    description:  snippet.description  || "",
    duration:     item.contentDetails?.duration || "",
    embeddable:   item.status?.embeddable !== false,
    _real: true,  // flag: real API data
  };
}

// Parse ISO 8601 duration (PT4M13S) → "4:13"
function parseDuration(iso) {
  if (!iso) return "";
  const m = iso.match(/PT(?:(\d+)H)?(?:(\d+)M)?(?:(\d+)S)?/);
  if (!m) return "";
  const h = parseInt(m[1]||0), min = parseInt(m[2]||0), s = parseInt(m[3]||0);
  if (h > 0) return `${h}:${String(min).padStart(2,"0")}:${String(s).padStart(2,"0")}`;
  return `${min}:${String(s).padStart(2,"0")}`;
}

// Format large numbers: 1234567 → "1.2M"
function fmtNum(n) {
  if (!n && n !== 0) return "";
  if (n >= 1e9) return (n/1e9).toFixed(1).replace(/\.0$/,"") + "B";
  if (n >= 1e6) return (n/1e6).toFixed(1).replace(/\.0$/,"") + "M";
  if (n >= 1e3) return (n/1e3).toFixed(1).replace(/\.0$/,"") + "K";
  return String(n);
}

// Relative time: "2023-01-15T..." → "2 years ago"
function relTime(iso) {
  if (!iso) return "";
  const diff = Date.now() - new Date(iso).getTime();
  const sec = Math.floor(diff / 1000);
  if (sec < 60)  return "just now";
  const min = Math.floor(sec/60);
  if (min < 60)  return `${min} min ago`;
  const hr = Math.floor(min/60);
  if (hr < 24)   return `${hr} hr ago`;
  const d = Math.floor(hr/24);
  if (d < 30)    return `${d} day${d>1?"s":""} ago`;
  const mo = Math.floor(d/30);
  if (mo < 12)   return `${mo} month${mo>1?"s":""} ago`;
  const yr = Math.floor(mo/12);
  return `${yr} year${yr>1?"s":""} ago`;
}

// ── API fetch helpers ──
async function ytFetch(endpoint, params = {}) {
  const url = new URL(`${YT_API_BASE}/${endpoint}`);
  url.searchParams.set("key", YT_API_KEY);
  Object.entries(params).forEach(([k,v]) => v !== undefined && url.searchParams.set(k, v));
  const res = await fetch(url.toString());
  if (!res.ok) {
    const err = await res.json().catch(() => ({}));
    throw new Error(err?.error?.message || `HTTP ${res.status}`);
  }
  return res.json();
}

// Search videos
async function apiSearch(q, maxResults = 20, pageToken = "") {
  // Fetch extra results to compensate for filtering
  const fetchCount = Math.min(maxResults * 2, 50);
  const data = await ytFetch("search", {
    part: "snippet", q, type: "video",
    maxResults: fetchCount,
    ...(pageToken ? { pageToken } : {}),
  });
  const ids = data.items.map(i => i.id.videoId).filter(Boolean).join(",");
  if (!ids) return { videos: [], nextPageToken: null };
  // Fetch status to check embeddable field
  const details = await ytFetch("videos", {
    part: "snippet,statistics,contentDetails,status", id: ids,
  });
  // Filter: only embeddable videos
  const videos = details.items
    .filter(item => item.status?.embeddable !== false)
    .slice(0, maxResults)
    .map(ytItemToVideo);
  return { videos, nextPageToken: data.nextPageToken || null };
}

// ── Google OAuth 2.0 via Google Identity Services (GIS) ──
// GIS works from local/content:// files — no redirect_uri needed
function googleSignIn(callback) {
  // Wait for GIS library to load
  const tryInit = (attempt) => {
    if (!window.google?.accounts?.oauth2) {
      if (attempt > 20) { callback(new Error("GIS library not loaded")); return; }
      setTimeout(() => tryInit(attempt + 1), 300);
      return;
    }
    try {
      const client = window.google.accounts.oauth2.initTokenClient({
        client_id: YT_CLIENT_ID,
        scope: [
          "https://www.googleapis.com/auth/userinfo.profile",
          "https://www.googleapis.com/auth/userinfo.email",
          "https://www.googleapis.com/auth/youtube.readonly",
        ].join(" "),
        callback: (response) => {
          if (response.error) {
            callback(new Error(response.error_description || response.error));
          } else {
            callback(null, response.access_token);
          }
        },
        error_callback: (err) => {
          callback(new Error(err.message || "Sign-in failed"));
        },
      });
      client.requestAccessToken({ prompt: "select_account" });
    } catch(e) {
      callback(e);
    }
  };
  tryInit(0);
}

// ── Fetch latest videos from a set of channel IDs ──
// Returns embeddable videos sorted by publishedAt (newest first)
async function apiChannelLatestVideos(channelIds, maxPerChannel = 5) {
  if (!channelIds || channelIds.length === 0) return [];
  // Batch: fetch latest 3-5 videos per channel in parallel (up to 10 channels at once)
  const batches = [];
  for (let i = 0; i < channelIds.length; i += 10) {
    batches.push(channelIds.slice(i, i + 10));
  }
  const allVideos = [];
  for (const batch of batches) {
    const searches = batch.map(channelId =>
      ytFetch("search", {
        part: "snippet",
        channelId,
        type: "video",
        maxResults: maxPerChannel,
        order: "date",
      }).catch(() => ({ items: [] }))
    );
    const results = await Promise.all(searches);
    const ids = results.flatMap(d => (d.items || []).map(i => i.id?.videoId)).filter(Boolean);
    if (ids.length === 0) continue;
    // Batch fetch details+status
    const details = await ytFetch("videos", {
      part: "snippet,statistics,contentDetails,status",
      id: ids.join(","),
    }).catch(() => ({ items: [] }));
    const videos = (details.items || [])
      .filter(item => item.status?.embeddable !== false)
      .map(ytItemToVideo);
    allVideos.push(...videos);
  }
  // Sort newest first
  allVideos.sort((a, b) => new Date(b.publishedAt) - new Date(a.publishedAt));
  return allVideos;
}

// ── Build personalized home feed when logged in ──
// Mixes: latest from subscriptions + algorithm (trending weighted by watch history)
async function apiPersonalizedFeed(accessToken, historyVideos = [], maxResults = 30) {
  let subChannelIds = [];
  let subChannels = [];
  try {
    subChannels = await apiMySubscriptions(accessToken, 50);
    subChannelIds = subChannels.map(c => c.id);
  } catch (e) {
    console.warn("Could not fetch subscriptions:", e.message);
  }

  // ── 1. Subscription feed: latest from subscribed channels ──
  let subVideos = [];
  if (subChannelIds.length > 0) {
    // Limit channels to avoid too many API calls: prioritize most-watched channels
    const watchedChannelFreq = {};
    historyVideos.forEach(v => {
      watchedChannelFreq[v.channelId || v.channel] = (watchedChannelFreq[v.channelId || v.channel] || 0) + 1;
    });
    // Sort subscribed channels: most watched first, then rest
    const sortedChannelIds = [...subChannelIds].sort((a, b) => {
      const fa = subChannels.find(c => c.id === a);
      const fb = subChannels.find(c => c.id === b);
      const wa = watchedChannelFreq[a] || watchedChannelFreq[fa?.name] || 0;
      const wb = watchedChannelFreq[b] || watchedChannelFreq[fb?.name] || 0;
      return wb - wa;
    });
    // Fetch from top 20 channels max (API quota protection)
    subVideos = await apiChannelLatestVideos(sortedChannelIds.slice(0, 20), 3);
  }

  // ── 2. Algorithm feed: based on watch history keywords ──
  let algoVideos = [];
  const watchedIds = new Set([...historyVideos.map(v => v.id), ...subVideos.map(v => v.id)]);
  
  try {
    // Build query from recent watch history
    const stopWords = new Set(["the","a","an","in","of","for","ft","and","to","on","by","feat","official","video","music","lyrics"]);
    const keywords = historyVideos.slice(0, 15)
      .flatMap(v => v.title.toLowerCase().replace(/[^a-z0-9 ]/g," ").split(" "))
      .filter(w => w.length > 3 && !stopWords.has(w));
    const freq = {};
    keywords.forEach(w => { freq[w] = (freq[w] || 0) + 1; });
    const topKeywords = Object.entries(freq).sort((a,b)=>b[1]-a[1]).slice(0,4).map(([w])=>w);
    
    // Use top keywords or trending fallback
    const algoQuery = topKeywords.length > 1
      ? topKeywords.slice(0, 3).join(" ")
      : "trending music 2025";
    
    const result = await apiSearch(algoQuery, 20);
    algoVideos = (result?.videos || []).filter(v => !watchedIds.has(v.id));
  } catch {}

  // ── 3. Merge: subscription videos first, then algorithm, deduplicated ──
  const merged = [];
  const seenIds = new Set();
  
  // Interleave: every 3 sub videos → 1 algo video (like real YouTube)
  const subQueue  = [...subVideos];
  const algoQueue = [...algoVideos];
  let subTake = 0;
  
  while (merged.length < maxResults && (subQueue.length > 0 || algoQueue.length > 0)) {
    if (subQueue.length > 0 && subTake < 3) {
      const v = subQueue.shift();
      if (!seenIds.has(v.id)) { seenIds.add(v.id); merged.push({ ...v, _fromSub: true }); subTake++; }
    } else if (algoQueue.length > 0) {
      const v = algoQueue.shift();
      if (!seenIds.has(v.id)) { seenIds.add(v.id); merged.push(v); }
      subTake = 0;
    } else {
      subTake = 0;
      if (subQueue.length > 0) {
        const v = subQueue.shift();
        if (!seenIds.has(v.id)) { seenIds.add(v.id); merged.push({ ...v, _fromSub: true }); }
      }
    }
  }

  return { videos: merged, subChannels };
}

// ── useYouTubeSearch hook ──
function useYouTubeSearch() {
  const [searching, setSearching] = useState(false);
  const [apiError,  setApiError]  = useState("");

  const search = useCallback(async (q, maxResults = 20) => {
    if (!q.trim()) return null;
    setSearching(true);
    setApiError("");
    try {
      const result = await apiSearch(q, maxResults);
      setSearching(false);
      return result;
    } catch(e) {
      setApiError(e.message || "Search failed");
      setSearching(false);
      return null;
    }
  }, []);

  return { search, searching, apiError };
}

// ── useYouTubeTrending hook ──
function useYouTubeTrending() {
  const [trending,  setTrending]  = useState([]);
  const [loading,   setLoading]   = useState(false);
  const [apiError,  setApiError]  = useState("");

  const load = useCallback(async (region = "BD") => {
    setLoading(true);
    setApiError("");
    try {
      const videos = await apiTrending(region);
      setTrending(videos);
    } catch(e) {
      setApiError(e.message || "Failed to load trending");
    }
    setLoading(false);
  }, []);

  return { trending, loading, apiError, load };
}

// ══════════════════════════════════════════════════════════
//  useLocalStorage
// ══════════════════════════════════════════════════════════
function useLocalStorage(key, initial) {
  const [val, setVal] = useState(() => {
    try { const s = localStorage.getItem(key); return s ? JSON.parse(s) : initial; }
    catch { return initial; }
  });
  const set = useCallback((v) => {
    const next = typeof v === "function" ? v(val) : v;
    setVal(next);
    try { localStorage.setItem(key, JSON.stringify(next)); } catch {}
  }, [key, val]);
  return [val, set];
}

// ══════════════════════════════════════════════════════════
//  Draggable + Resizable hook  (mouse + touch)
// ══════════════════════════════════════════════════════════
function useDragResize(initialPos, initialSize) {
  const [pos, setPos] = useState(initialPos);
  const [size, setSize] = useState(initialSize);
  const state = useRef({ dragging: false, resizing: false, mx: 0, my: 0, w: 0, h: 0, px: 0, py: 0 });

  const getXY = (e) => e.touches ? { x: e.touches[0].clientX, y: e.touches[0].clientY }
                                 : { x: e.clientX,             y: e.clientY };

  const onDragStart = (e) => {
    if (e.target.dataset.resize) return;
    const { x, y } = getXY(e);
    state.current = { ...state.current, dragging: true, mx: x - pos.x, my: y - pos.y };
  };
  const onResizeStart = (e) => {
    e.stopPropagation();
    const { x, y } = getXY(e);
    state.current = { ...state.current, resizing: true, mx: x, my: y, w: size.w, h: size.h };
  };

  useEffect(() => {
    const move = (e) => {
      const { x, y } = getXY(e);
      if (state.current.dragging) {
        const vw = window.innerWidth  || 800;
        const vh = window.innerHeight || 600;
        setPos({
          x: Math.max(0, Math.min(vw - 120, x - state.current.mx)),
          y: Math.max(0, Math.min(vh - 48,  y - state.current.my)),
        });
      }
      if (state.current.resizing) setSize({
        w: Math.max(260, state.current.w + (x - state.current.mx)),
        h: Math.max(170, state.current.h + (y - state.current.my)),
      });
    };
    const up = () => { state.current.dragging = false; state.current.resizing = false; };
    window.addEventListener("mousemove", move);
    window.addEventListener("mouseup",   up);
    window.addEventListener("touchmove", move, { passive: false });
    window.addEventListener("touchend",  up);
    return () => {
      window.removeEventListener("mousemove", move);
      window.removeEventListener("mouseup",   up);
      window.removeEventListener("touchmove", move);
      window.removeEventListener("touchend",  up);
    };
  }, []);

  return { pos, setPos, size, setSize, onDragStart, onResizeStart };
}

function Toast({ message, onDone }) {
  useEffect(() => {
    const t = setTimeout(onDone, 2200);
    return () => clearTimeout(t);
  }, [message]);
  return (
    <div style={{
      position: "fixed", bottom: 80, left: "50%", transform: "translateX(-50%)",
      background: "#1a1a2e", border: "1px solid #ff005066",
      color: "#fff", fontSize: 12, padding: "8px 18px", borderRadius: 20,
      zIndex: 99999, boxShadow: "0 4px 24px #ff005033",
      animation: "fadeInUp 0.25s ease",
      whiteSpace: "nowrap",
    }}>
      {message}
      <style>{`@keyframes fadeInUp{from{opacity:0;transform:translateX(-50%) translateY(10px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}`}</style>
    </div>
  );
}

//  Sleep-Timer badge (counts down, shown in minimised bar)
// ══════════════════════════════════════════════════════════
function SleepTimerBadge({ seconds, onClear }) {
  const [left, setLeft] = useState(seconds);
  useEffect(() => {
    setLeft(seconds);
    const t = setInterval(() => setLeft(p => p <= 1 ? (onClear(), 0) : p - 1), 1000);
    return () => clearInterval(t);
  }, [seconds]);
  if (!left) return null;
  const m = Math.floor(left / 60), s = left % 60;
  return (
    <span style={{ background: "#ff005022", color: "#ff0050", fontSize: 10, padding: "2px 7px",
      borderRadius: 20, fontWeight: 700, cursor: "pointer" }} onClick={onClear}>
      ⏱ {m}:{String(s).padStart(2,"0")}
    </span>
  );
}

// ══════════════════════════════════════════════════════════
//  Focus Mode Badge (shown in titlebar when active)
// ══════════════════════════════════════════════════════════
function FocusBadge({ elapsed, totalSecs, onClear }) {
  const pct = Math.min(100, (elapsed / totalSecs) * 100);
  const rem = Math.max(0, totalSecs - elapsed);
  const rm = Math.floor(rem / 60);
  const rs = rem % 60;
  return (
    <span
      onClick={onClear}
      title="Click to cancel Focus Mode"
      style={{
        display: "inline-flex", alignItems: "center", gap: 5,
        background: "#ff005018", border: "1px solid #ff005055",
        borderRadius: 20, padding: "2px 8px 2px 6px",
        cursor: "pointer", position: "relative", overflow: "hidden",
      }}
    >
      {/* progress fill */}
      <span style={{
        position: "absolute", left: 0, top: 0, bottom: 0,
        width: `${pct}%`, background: "#ff005022",
        transition: "width 1s linear", borderRadius: 20,
      }} />
      <span style={{ fontSize: 10, position: "relative" }}>🧠</span>
      <span style={{ color: "#ff0050", fontSize: 10, fontWeight: 700, position: "relative" }}>
        {rm}:{String(rs).padStart(2, "0")}
      </span>
    </span>
  );
}

function VideoCard({ video, onPlay, isPlaying, isFav, onToggleFav, onAddToSaved, onAddToQueue, isQueued, recommendScore }) {
  const [hover, setHover] = useState(false);
  return (
    <div
      onClick={() => onPlay(video)}
      onMouseEnter={() => setHover(true)}
      onMouseLeave={() => setHover(false)}
      style={{
        display: "flex", gap: 10, padding: "10px 12px", cursor: "pointer",
        borderRadius: 10, transition: "background 0.15s",
        background: isPlaying ? "#ff005018" : hover ? "#ffffff07" : "transparent",
        border: isPlaying ? "1px solid #ff005044" : "1px solid transparent",
      }}
    >
      <div style={{ position: "relative", flexShrink: 0 }}>
        <img src={video.thumb} alt={video.title}
          style={{ width: 120, height: 68, borderRadius: 8, objectFit: "cover", display: "block" }} />
        {isPlaying && (
          <div style={{ position: "absolute", inset: 0, background: "#ff005055",
            borderRadius: 8, display: "flex", alignItems: "center", justifyContent: "center" }}>
            <span style={{ color: "#fff", fontSize: 22 }}>▶</span>
          </div>
        )}
        {!isPlaying && hover && (
          <div style={{ position: "absolute", inset: 0, background: "#0009",
            borderRadius: 8, display: "flex", alignItems: "center", justifyContent: "center" }}>
            <span style={{ color: "#fff", fontSize: 22 }}>▶</span>
          </div>
        )}
        {/* Queue badge on thumbnail */}
        {isQueued && !isPlaying && (
          <div style={{ position: "absolute", top: 4, left: 4, background: "#ff005099",
            borderRadius: 4, padding: "1px 5px", fontSize: 9, color: "#fff", fontWeight: 700 }}>
            IN QUEUE
          </div>
        )}
        {/* Recommendation match badge */}
        {recommendScore > 0 && (
          <div style={{ position: "absolute", bottom: 4, left: 4, background: "#ff005099",
            borderRadius: 4, padding: "1px 6px", fontSize: 9, color: "#fff", fontWeight: 700,
            display: "flex", alignItems: "center", gap: 3 }}>
            ✨ {recommendScore >= 60 ? "Top Pick" : recommendScore >= 30 ? "Good Match" : "Suggested"}
          </div>
        )}
      </div>
      <div style={{ flex: 1, minWidth: 0 }}>
        <div style={{
          color: "#e8e8e8", fontSize: 13, fontWeight: 500, lineHeight: 1.4,
          display: "-webkit-box", WebkitLineClamp: 2, WebkitBoxOrient: "vertical", overflow: "hidden",
        }}>{video.title}</div>
        <div style={{ color: "#666", fontSize: 11, marginTop: 4 }}>{video.channel}</div>
      </div>
      {/* action buttons — stop propagation so clicks don't trigger play */}
      <div style={{ display: "flex", flexDirection: "column", gap: 4, justifyContent: "center", flexShrink: 0 }}
        onClick={e => e.stopPropagation()}>
        <button onClick={() => onToggleFav(video)} title="Favourite"
          style={{ background: "none", border: "none", cursor: "pointer",
            color: isFav ? "#ffd700" : "#444", fontSize: 16 }}>★</button>
        <button onClick={() => onAddToSaved(video)} title="Add to playlist"
          style={{ background: "none", border: "none", cursor: "pointer", color: "#ff0050", fontSize: 16 }}>＋</button>
        <button onClick={() => onAddToQueue(video)} title="Add to Queue"
          style={{ background: "none", border: "none", cursor: "pointer",
            color: isQueued ? "#ff0050" : "#444", fontSize: 13, fontWeight: 700 }}>≡▶</button>
      </div>
    </div>
  );
}

// ══════════════════════════════════════════════════════════
//  Video Context Menu (⋮ button popup)
// ══════════════════════════════════════════════════════════
function VideoContextMenu({ video, x, y, onClose, onPlay, onAddToPlaylist, onAddToQueue, onToggleFav, isFav, isQueued, onShare }) {
  const ref = useRef(null);

  // Close on outside click
  useEffect(() => {
    const handler = (e) => { if (ref.current && !ref.current.contains(e.target)) onClose(); };
    document.addEventListener("mousedown", handler);
    document.addEventListener("touchstart", handler);
    return () => { document.removeEventListener("mousedown", handler); document.removeEventListener("touchstart", handler); };
  }, [onClose]);

  // Smart position — keep inside viewport
  const menuW = 220, menuH = 280;
  const vw = window.innerWidth, vh = window.innerHeight;
  const left = Math.min(x, vw - menuW - 8);
  const top  = Math.min(y, vh - menuH - 8);

  const items = [
    { icon: "▶", label: "Play now",           action: onPlay },
    { icon: "≡▶", label: isQueued ? "Remove from queue" : "Add to queue", action: onAddToQueue },
    { icon: "★", label: isFav    ? "Remove from favourites" : "Add to favourites", action: onToggleFav },
    { icon: "📂", label: "Save to playlist",   action: onAddToPlaylist },
    { icon: "🔗", label: "Copy link / Share",  action: onShare },
  ];

  return (
    <div ref={ref} style={{
      position: "fixed", left, top, zIndex: 99999,
      background: "#212121",
      border: "1px solid #3f3f3f",
      borderRadius: 12,
      boxShadow: "0 8px 32px #000a",
      minWidth: menuW,
      animation: "fadeIn 0.12s ease",
      overflow: "hidden",
    }}>
      {/* Video title header */}
      <div style={{ display: "flex", gap: 10, padding: "12px 14px", borderBottom: "1px solid #2f2f2f", alignItems: "center" }}>
        <img src={video.thumb} alt="" style={{ width: 52, height: 30, borderRadius: 5, objectFit: "cover", flexShrink: 0 }} />
        <div style={{ minWidth: 0 }}>
          <div style={{ color: "#f1f1f1", fontSize: 12, fontWeight: 500,
            overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap",
            maxWidth: 130 }}>{video.title}</div>
          <div style={{ color: "#717171", fontSize: 11, marginTop: 2 }}>{video.channel}</div>
        </div>
      </div>
      {/* Menu items */}
      {items.map(item => (
        <button key={item.label} onClick={item.action}
          style={{
            display: "flex", alignItems: "center", gap: 14,
            width: "100%", background: "none", border: "none",
            padding: "12px 16px", cursor: "pointer",
            color: "#f1f1f1", fontSize: 14, textAlign: "left",
            transition: "background 0.1s",
          }}
          onMouseEnter={e => { e.currentTarget.style.background = "#3f3f3f"; }}
          onMouseLeave={e => { e.currentTarget.style.background = "none"; }}>
          <span style={{ fontSize: 16, width: 20, textAlign: "center" }}>{item.icon}</span>
          {item.label}
        </button>
      ))}
    </div>
  );
}

// ══════════════════════════════════════════════════════════
//  Add-to-Playlist Popup  (modal)
// ══════════════════════════════════════════════════════════
function AddToPlaylistPopup({ video, playlists, onAdd, onCreate, onClose }) {
  const [newName, setNewName] = useState("");
  const [creating, setCreating] = useState(false);

  const handleCreate = () => {
    const name = newName.trim();
    if (!name) return;
    onCreate(name, video);
    setNewName("");
    setCreating(false);
    onClose();
  };

  return (
    <div style={{
      position: "fixed", inset: 0, zIndex: 99990,
      background: "#000b", display: "flex", alignItems: "center", justifyContent: "center",
    }} onClick={onClose}>
      <div style={{
        background: "#111120", border: "1px solid #ff005044",
        borderRadius: 18, padding: "20px 22px", width: 300,
        boxShadow: "0 16px 60px #ff005022, 0 4px 30px #000a",
      }} onClick={e => e.stopPropagation()}>

        {/* Header */}
        <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 14 }}>
          <span style={{ color: "#fff", fontWeight: 700, fontSize: 14 }}>📂 Add to Playlist</span>
          <button onClick={onClose} style={btn({ fontSize: 17, color: "#666" })}>✕</button>
        </div>

        {/* Video preview */}
        <div style={{ display: "flex", gap: 8, padding: "8px 10px",
          background: "#ffffff07", borderRadius: 10, marginBottom: 14 }}>
          <img src={video.thumb} style={{ width: 56, height: 32, borderRadius: 6, objectFit: "cover" }} alt="" />
          <div style={{ flex: 1, minWidth: 0 }}>
            <div style={{ color: "#ccc", fontSize: 10, fontWeight: 600,
              overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{video.title}</div>
            <div style={{ color: "#555", fontSize: 9, marginTop: 2 }}>{video.channel}</div>
          </div>
        </div>

        {/* Existing playlists */}
        <div style={{ maxHeight: 200, overflowY: "auto", marginBottom: 12 }}>
          {playlists.length === 0 && !creating && (
            <div style={{ color: "#444", fontSize: 12, textAlign: "center", padding: "14px 0" }}>
              No playlists yet. Create one below!
            </div>
          )}
          {playlists.map(pl => {
            const has = pl.videos.some(v => v.id === video.id);
            return (
              <div key={pl.id} onClick={() => { if (!has) { onAdd(pl.id, video); onClose(); } }}
                style={{
                  display: "flex", alignItems: "center", gap: 10,
                  padding: "8px 10px", borderRadius: 9, cursor: has ? "default" : "pointer",
                  background: has ? "#ff005011" : "transparent",
                  border: has ? "1px solid #ff005033" : "1px solid transparent",
                  marginBottom: 4, transition: "background 0.12s",
                }}
                onMouseEnter={e => { if (!has) e.currentTarget.style.background = "#ffffff08"; }}
                onMouseLeave={e => { if (!has) e.currentTarget.style.background = "transparent"; }}>
                {/* Mini thumbnail stack */}
                <div style={{ position: "relative", width: 36, height: 26, flexShrink: 0 }}>
                  {pl.videos.slice(0, 3).map((v, i) => (
                    <img key={v.id} src={v.thumb}
                      style={{ position: "absolute", top: i * 2, left: i * 2,
                        width: 32, height: 22, borderRadius: 4, objectFit: "cover",
                        border: "1px solid #ffffff11", zIndex: 3 - i }} alt="" />
                  ))}
                  {pl.videos.length === 0 && (
                    <div style={{ width: 32, height: 22, borderRadius: 4,
                      background: "#ffffff0a", border: "1px dashed #ffffff22",
                      display: "flex", alignItems: "center", justifyContent: "center" }}>
                      <span style={{ color: "#444", fontSize: 9 }}>📂</span>
                    </div>
                  )}
                </div>
                <div style={{ flex: 1, minWidth: 0 }}>
                  <div style={{ color: has ? "#ff0050" : "#ddd", fontSize: 12, fontWeight: 600,
                    overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{pl.name}</div>
                  <div style={{ color: "#555", fontSize: 10 }}>{pl.videos.length} videos</div>
                </div>
                {has
                  ? <span style={{ color: "#ff0050", fontSize: 11, fontWeight: 700, flexShrink: 0 }}>✓ Added</span>
                  : <span style={{ color: "#555", fontSize: 16, flexShrink: 0 }}>＋</span>}
              </div>
            );
          })}
        </div>

        {/* Create new */}
        {creating ? (
          <div style={{ display: "flex", gap: 6 }}>
            <input autoFocus value={newName} onChange={e => setNewName(e.target.value)}
              onKeyDown={e => { if (e.key === "Enter") handleCreate(); if (e.key === "Escape") setCreating(false); }}
              placeholder="Playlist name..."
              style={{ flex: 1, background: "#ffffff0d", border: "1px solid #ff005055",
                borderRadius: 8, padding: "7px 10px", color: "#fff", fontSize: 12, outline: "none" }} />
            <button onClick={handleCreate} style={{
              background: "#ff0050", border: "none", borderRadius: 8,
              padding: "7px 12px", color: "#fff", cursor: "pointer", fontSize: 12, fontWeight: 700,
            }}>✓</button>
            <button onClick={() => setCreating(false)} style={btn({ fontSize: 16, color: "#666" })}>✕</button>
          </div>
        ) : (
          <button onClick={() => setCreating(true)} style={{
            width: "100%", background: "#ff005018", border: "1px dashed #ff005055",
            borderRadius: 10, padding: "9px", color: "#ff0050",
            cursor: "pointer", fontSize: 12, fontWeight: 600,
          }}>＋ New Playlist</button>
        )}
      </div>
    </div>
  );

function PlaylistsPanel({ playlists, onPlay, onRename, onDelete, onRemoveVideo, currentId }) {
  const [selected, setSelected] = useState(null);
  const [renaming, setRenaming] = useState(null);
  const [renameVal, setRenameVal] = useState("");

  // Clear selected if the playlist was deleted
  useEffect(() => {
    if (selected && !playlists.find(p => p.id === selected)) setSelected(null);
  }, [playlists, selected]);

  const pl = playlists.find(p => p.id === selected);

  return (
    <div style={{ display: "flex", height: "calc(100vh - 160px)", overflow: "hidden" }}>

              transition: "all 0.12s",

            onMouseEnter={e => { if (selected !== p.id) e.currentTarget.style.background = "#ffffff06"; }}
            onMouseLeave={e => { if (selected !== p.id) e.currentTarget.style.background = "transparent"; }}>
            {renaming === p.id ? (
              <input autoFocus value={renameVal}
                onChange={e => setRenameVal(e.target.value)}
                onKeyDown={e => {
                  if (e.key === "Enter") { onRename(p.id, renameVal.trim() || p.name); setRenaming(null); }

function FloatTubeApp() {
  const [query,        setQuery]        = useState("");
  const [urlInput,     setUrlInput]     = useState("");
  const [results,      setResults]      = useState(SAMPLE_VIDEOS);
  const [currentVideo, setCurrentVideo] = useState(null);
  const [playerOpen,   setPlayerOpen]   = useState(false);
  const [minimized,    setMinimized]    = useState(false);
  const [musicMode,    setMusicMode]    = useState(false);
  const [autoPlay,     setAutoPlay]     = useState(true);
  const [showSidebar,  setShowSidebar]  = useState(false);
  const [showMoreMenu, setShowMoreMenu] = useState(false);
  const [tab,          setTab]          = useState("home");
  const [showProfilePage, setShowProfilePage] = useState(false);
  const [googleAccount, setGoogleAccount] = useLocalStorage("ft_google_account", null);
  // googleAccount = { name, email, avatar, accessToken } or null

  // Sync googleAccount to window so YouTubeInlinePlayer (child) can access it
  useEffect(() => { window.__googleAccount = googleAccount; }, [googleAccount]);

  // ── Subscription & personalized feed state ──
  const [subChannels,      setSubChannels]      = useState([]); // [{id, name, thumb}]
  const [subFeedVideos,    setSubFeedVideos]     = useState([]); // latest from subscribed channels
  const [subFeedLoading,   setSubFeedLoading]    = useState(false);
  const [subFeedLoaded,    setSubFeedLoaded]     = useState(false);
  const [personalizedFeed, setPersonalizedFeed]  = useState([]); // home feed when logged in

  // ── YouTube API state ──
  const { search: ytSearch, searching: ytSearching } = useYouTubeSearch();
  const { trending, loading: trendingLoading, load: loadTrending } = useYouTubeTrending();
  const [apiSearchNextPage, setApiSearchNextPage] = useState(null);
  const [homeLoaded,        setHomeLoaded]        = useState(false);
  const [apiToast,          setApiToast]          = useState("");

  const [history,  setHistory]  = useLocalStorage("ft_history",  []);
  const [favourites, setFavs]   = useLocalStorage("ft_favs",     []);
  const [saved,    setSaved]    = useLocalStorage("ft_saved",     []);
  const [playlist, setPlaylist] = useState(SAMPLE_VIDEOS);
  const [shuffle,  setShuffle]  = useState(false);
  const [queue,    setQueue]    = useState([]);
  const [showQueue, setShowQueue] = useState(false);

  // ── Custom Playlists ──
  const [customPlaylists, setCustomPlaylists] = useLocalStorage("ft_custom_playlists", []);
  const [addToPlaylistVideo, setAddToPlaylistVideo] = useState(null);
  const [videoContextMenu, setVideoContextMenu]     = useState(null); // { video, x, y }

  const createPlaylist = (name, video) => {
    const newPl = { id: Date.now().toString(), name, videos: video ? [video] : [], createdAt: Date.now() };
    setCustomPlaylists(prev => [...prev, newPl]);
  };
  const deletePlaylist = (id) => setCustomPlaylists(prev => prev.filter(p => p.id !== id));
  const renamePlaylist = (id, name) => setCustomPlaylists(prev => prev.map(p => p.id === id ? { ...p, name } : p));
  const addVideoToPlaylist = (plId, video) => {
    setCustomPlaylists(prev => prev.map(p =>
      p.id === plId ? { ...p, videos: p.videos.find(v => v.id === video.id) ? p.videos : [...p.videos, video] } : p
    ));
  };
  const removeVideoFromPlaylist = (plId, videoId) => {
    setCustomPlaylists(prev => prev.map(p =>
      p.id === plId ? { ...p, videos: p.videos.filter(v => v.id !== videoId) } : p
    ));
  };
  const playPlaylist = (video, videos) => { setPlaylist(videos); playVideo(video); };

  // ── play ──
  const playVideo = useCallback((video) => {
    setCurrentVideo(video);
    setPlayerOpen(true);
    setMinimized(false);
    setHistory(prev => [video, ...prev.filter(v => v.id !== video.id)].slice(0, 60));
  }, [setHistory]);

  // ── play from YouTube URL ──
  const playFromUrl = async (e) => {
    e && e.preventDefault();
    const id = extractVideoId(urlInput);
    if (!id) { setApiToast("⚠ Invalid YouTube URL or ID"); setTimeout(()=>setApiToast(""),3000); return; }
    setUrlInput("");
    // Try to fetch real metadata
    let video = { id, title: `Video (${id})`, thumb: `https://i.ytimg.com/vi/${id}/mqdefault.jpg`, channel: "YouTube" };
    try {
      const details = await apiVideoDetails([id]);
      if (details.length > 0) video = details[0];
    } catch {}
    playVideo(video);
  };

  const handleNext = useCallback(() => {
    if (!currentVideo) return;
    // Queue takes priority — pop from front
    if (queue.length > 0) {
      const [next, ...rest] = queue;
      setQueue(rest);
      playVideo(next);
      return;
    }
    const src = playlist.length ? playlist : SAMPLE_VIDEOS;
    if (shuffle) {
      const others = src.filter(v => v.id !== currentVideo.id);
      const pick = others[Math.floor(Math.random() * others.length)] || src[0];
      playVideo(pick);
    } else {
      const idx = src.findIndex(v => v.id === currentVideo.id);
      playVideo(src[(idx + 1) % src.length]);
    }
  }, [currentVideo, playlist, shuffle, playVideo, queue]);

  const handlePrev = useCallback(() => {
    if (!currentVideo) return;
    const src = playlist.length ? playlist : SAMPLE_VIDEOS;
    const idx  = src.findIndex(v => v.id === currentVideo.id);
    playVideo(src[(idx - 1 + src.length) % src.length]);
  }, [currentVideo, playlist, playVideo]);

  // ── Load home feed (personalized if logged in, else trending) ──
  useEffect(() => {
    if (tab !== "home") return;
    const token = googleAccount?.accessToken;

    if (token) {
      // ── Logged in: personalized feed ──
      if (personalizedFeed.length > 0) {
        // Already loaded for this session, just show it
        setResults(personalizedFeed);
        setPlaylist(personalizedFeed);
        return;
      }
      setHomeLoaded(true);
      setApiToast("⏳ Loading your feed...");
      apiPersonalizedFeed(token, history, 30)
        .then(({ videos, subChannels: channels }) => {
          setSubChannels(channels || []);
          if (videos.length > 0) {
            setPersonalizedFeed(videos);
            setResults(videos);
            setPlaylist(videos);
            setApiToast("");
          } else {
            // Fallback to trending if personalized fetch failed
            loadTrending("BD");
            setApiToast("⚠ Showing trending — subscription feed unavailable");
            setTimeout(() => setApiToast(""), 3000);
          }
        })
        .catch(() => {
          loadTrending("BD");

// ══════════════════════════════════════════════════════════
//  MINI PLAYER CONTROLS — play/pause synced with YT iframe
// ══════════════════════════════════════════════════════════
function MiniPlayerControls({ onPrev, onNext, onClose, videoId }) {
  const [playing, setPlaying] = useState(true);
  const iframeId = `yt-mini-${videoId}`;

  const getPlayer = () => {
    if (window.YT && window.YT.get) return window.YT.get(iframeId);
    return null;
  };

  const togglePlay = () => {
    const p = getPlayer();
    if (!p) return;
    if (playing) { p.pauseVideo(); setPlaying(false); }
    else         { p.playVideo();  setPlaying(true);  }
  };

  // Sync state — poll player status
  useEffect(() => {
    const t = setInterval(() => {
      const p = getPlayer();
      if (!p?.getPlayerState) return;
      const s = p.getPlayerState();
      if (s === 1) setPlaying(true);
      if (s === 2 || s === 0) setPlaying(false);
    }, 600);
    return () => clearInterval(t);
  }, [videoId]);

  const btnStyle = {
    background: "none", border: "none", cursor: "pointer",
    color: "#f1f1f1", padding: "6px", display: "flex", alignItems: "center",
  };

  return (
    <div style={{ display: "flex", alignItems: "center", gap: 2, flexShrink: 0 }}>
      {/* Prev */}
      <button onClick={onPrev} style={btnStyle}>
        <svg width="20" height="20" viewBox="0 0 24 24" fill="#f1f1f1"><path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/></svg>
      </button>
      {/* Play/Pause */}
      <button onClick={togglePlay} style={{ ...btnStyle, padding: "4px 8px" }}>
        {playing
          ? <svg width="22" height="22" viewBox="0 0 24 24" fill="#f1f1f1"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
          : <svg width="22" height="22" viewBox="0 0 24 24" fill="#f1f1f1"><path d="M8 5v14l11-7z"/></svg>
        }
      </button>
      {/* Next */}
      <button onClick={onNext} style={btnStyle}>
        <svg width="20" height="20" viewBox="0 0 24 24" fill="#f1f1f1"><path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/></svg>
      </button>
      {/* Close */}
      <button onClick={onClose} style={{ ...btnStyle, color: "#aaa" }}>
        <svg width="20" height="20" viewBox="0 0 24 24" fill="#aaa"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>
      </button>
    </div>
  );
}
