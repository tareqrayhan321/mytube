];

// ══════════════════════════════════════════════════════════
//  YouTube Inline Player — Full Official Layout
//  Video + Controls + Info + Description + Like/Dislike
//  Subscribe + Action Chips + Comments + Related Videos
// ══════════════════════════════════════════════════════════
function YouTubeInlinePlayer({ video, onClose, onMinimize, onNext, onPrev, onEnded, isFav, onToggleFav, onAddToPlaylist, playlist, currentVideo, playVideo, addToQueue, isQueued, autoPlay = true, setAutoPlay }) {

  // ── Player refs ──
  const playerDivRef = useRef(null);
  const ytRef        = useRef(null);
  const intervalRef  = useRef(null);
  const ctrlTimer    = useRef(null);
  const seekBarRef   = useRef(null);

  // ── Player state ──
  const [playing,      setPlaying]      = useState(true);
  const [progress,     setProgress]     = useState(0);
  const [duration,     setDuration]     = useState(0);
  const [volume,       setVolume]       = useState(100);
  const [muted,        setMuted]        = useState(false);
  const [showCtrl,     setShowCtrl]     = useState(true);
  const [isFullscreen, setIsFullscreen] = useState(false);
  const [buffered,     setBuffered]     = useState(0);
  const [quality,      setQuality]      = useState("Auto");
  const [showQuality,  setShowQuality]  = useState(false);
  const [playbackRate, setPlaybackRate] = useState(1);
  const [showSpeed,    setShowSpeed]    = useState(false);
  const [isSeeking,    setIsSeeking]    = useState(false);
  const [toast,        setToast]        = useState("");
  const [embedError,   setEmbedError]   = useState(null); // null | {code, msg}
  const [speed,        setSpeed]        = useState(1);

  // ── Info panel state ──
  const [liked,        setLiked]        = useState(false);
  const [disliked,     setDisliked]     = useState(false);
  const [subscribed,   setSubscribed]   = useState(false);
  const [likeCount,    setLikeCount]    = useState(() => Math.floor(Math.random()*900+100) + "K");
  const [descExpanded, setDescExpanded] = useState(false);
  const [activeChipPl, setActiveChipPl] = useState("comments"); // "comments" | "related" | "chapters"

  // ── Real API data state ──
  const [realViewCount,   setRealViewCount]   = useState(video.viewCount || null);
  const [realLikeCount,   setRealLikeCount]   = useState(video.likeCount ? fmtNum(video.likeCount) : null);
  const [realDescription, setRealDescription] = useState(video.description || "");
  const [realPublishedAt, setRealPublishedAt] = useState(video.publishedAt || "");
  const [realChannelId,   setRealChannelId]   = useState(video.channelId || "");
  const [channelSubs,     setChannelSubs]     = useState(null);
  const [channelAvatar,   setChannelAvatar]   = useState(null);

  // Load channel info when channelId is known
  useEffect(() => {
    const cid = realChannelId || video.channelId;
    if (!cid) return;
    apiChannelDetails(cid).then(ch => {
      if (!ch) return;
      const subs = ch.statistics?.subscriberCount;
      if (subs) setChannelSubs(Number(subs));
      const avatar = ch.snippet?.thumbnails?.default?.url;
      if (avatar) setChannelAvatar(avatar);
    }).catch(() => {});
  }, [realChannelId, video.channelId]);

  // ── Comments state ──
  const [comments,     setComments]     = useState(SAMPLE_COMMENTS);
  const [commentInput, setCommentInput] = useState("");
  const [commentSort,  setCommentSort]  = useState("top"); // "top" | "new"
  const [expandedReplies, setExpandedReplies] = useState({});
  const [replyInput,   setReplyInput]   = useState({});
  const [showReplyBox, setShowReplyBox] = useState({});
  const [commentFocus, setCommentFocus] = useState(false);

  // ── Helpers ──
  const fmtTime = (s) => {
    s = Math.floor(s || 0);
    const h = Math.floor(s / 3600);
    const m = Math.floor((s % 3600) / 60);
    const sec = s % 60;
    if (h > 0) return `${h}:${String(m).padStart(2,"0")}:${String(sec).padStart(2,"0")}`;
    return `${m}:${String(sec).padStart(2,"0")}`;
  };
  const fmtCount = (n) => n >= 1000 ? (n/1000).toFixed(1)+"K" : String(n);

  // ── Tick (progress) ──
  const startTick = () => {
    clearInterval(intervalRef.current);
    intervalRef.current = setInterval(() => {
      if (!ytRef.current?.getCurrentTime) return;
      setProgress(ytRef.current.getCurrentTime() || 0);
      setDuration(ytRef.current.getDuration()    || 0);
    }, 250);
  };
  const stopTick = () => clearInterval(intervalRef.current);

  // ── Init player ──
  useEffect(() => {
    setEmbedError(null);
    loadYTScript().then((YT) => {
      if (ytRef.current) { ytRef.current.destroy(); ytRef.current = null; }
      if (!playerDivRef.current) return;
      const currentOrigin = (window.location.protocol === "file:" || window.location.protocol === "content:")
        ? "https://www.youtube.com" : window.location.origin;
      ytRef.current = new YT.Player(playerDivRef.current, {
        videoId: video.id,
        host: "https://www.youtube-nocookie.com",
        playerVars: {
          autoplay: 1, controls: 0, rel: 0, modestbranding: 1,
          iv_load_policy: 3, playsinline: 1, enablejsapi: 1,
          origin: currentOrigin,
        },
        events: {
          onReady: (e) => {
            e.target.setVolume(volume);
            e.target.setPlaybackRate(speed);
            if (muted) e.target.mute();
          },
          onStateChange: (e) => {
            if (e.data === YT.PlayerState.PLAYING) { setPlaying(true);  startTick(); }
            if (e.data === YT.PlayerState.PAUSED)  { setPlaying(false); stopTick();  }
            if (e.data === YT.PlayerState.ENDED)   { stopTick(); if (autoPlay) onEnded?.(); }
          },
          onError: (e) => {
            const msgs = {
              2: "Invalid video ID",
              5: "HTML5 player error",
              100: "Video not found or private",
              101: "Embedding not allowed by owner",
              150: "Embedding not allowed by owner",
            };
            const msg = msgs[e.data] || `Playback error (${e.data})`;
            setToast(`⚠ ${msg}`);
            if (e.data === 101 || e.data === 150 || e.data === 100) {
              setEmbedError({ code: e.data, msg });
              // Auto-skip disabled — user manually skips or watches on YouTube
            }
            setPlaying(false);
          },
        },
      });
    });
    return () => { if (ytRef.current) { ytRef.current.destroy(); ytRef.current = null; } stopTick(); };
  }, [video.id]);

  // Reset state on video change + load real data
  useEffect(() => {
    setLiked(false); setDisliked(false); setDescExpanded(false);
    setActiveChipPl("comments"); setComments(SAMPLE_COMMENTS);

    // Load real comments
    apiComments(video.id, 20).then(realComments => {
      if (realComments.length > 0) setComments(realComments);
    }).catch(() => {});

    // If video doesn't have real data, fetch it
    if (!video._real && video.id) {
      apiVideoDetails([video.id]).then(details => {
        if (details.length > 0) {
          // Update the video object with real data (parent will handle)
          const v = details[0];
          // Patch local state used in the player
          if (v.viewCount) setRealViewCount(v.viewCount);
          if (v.likeCount) setRealLikeCount(fmtNum(v.likeCount));
          if (v.description) setRealDescription(v.description);
          if (v.publishedAt) setRealPublishedAt(v.publishedAt);
          if (v.channelId) setRealChannelId(v.channelId);
        }
      }).catch(() => {});
    } else {
      setRealViewCount(video.viewCount || null);
      setRealLikeCount(video.likeCount ? fmtNum(video.likeCount) : null);
      setRealDescription(video.description || "");
      setRealPublishedAt(video.publishedAt || "");
      setRealChannelId(video.channelId || "");
    }
  }, [video.id]);

  // ── Auto-hide controls ──
  const revealControls = () => {
    setShowCtrl(true);
    clearTimeout(ctrlTimer.current);
    ctrlTimer.current = setTimeout(() => setShowCtrl(false), 3500);
  };
  useEffect(() => { revealControls(); return () => clearTimeout(ctrlTimer.current); }, []);

  // ── Playback controls ──
  const togglePlay  = () => { revealControls(); playing ? ytRef.current?.pauseVideo() : ytRef.current?.playVideo(); };
  const skipSec     = (s) => { ytRef.current?.seekTo((ytRef.current.getCurrentTime()||0)+s, true); revealControls(); };
  const toggleMute  = () => { const nm=!muted; setMuted(nm); nm ? ytRef.current?.mute() : ytRef.current?.unMute(); };
  const changeSpeed = (s) => { setPlaybackRate(s); ytRef.current?.setPlaybackRate(s); setShowSpeed(false); };

  // ── Seek bar (touch + mouse) ──
  const handleSeek = (e) => {
    if (!duration || !seekBarRef.current) return;
    const r = seekBarRef.current.getBoundingClientRect();
    const clientX = e.touches ? e.touches[0].clientX : e.clientX;
    const pct = Math.max(0, Math.min(1, (clientX - r.left) / r.width));
    ytRef.current?.seekTo(pct * duration, true);
    setProgress(pct * duration);
  };

  // ── Fullscreen ──
  const toggleFullscreen = async () => {
    const el = playerDivRef.current?.closest?.("[data-yt-player]") || playerDivRef.current;
    try {
      if (!document.fullscreenElement) { await el?.requestFullscreen(); setIsFullscreen(true); }
      else { await document.exitFullscreen(); setIsFullscreen(false); }
    } catch {}
  };
  useEffect(() => {
    const h = () => setIsFullscreen(!!document.fullscreenElement);
    document.addEventListener("fullscreenchange", h);
    return () => document.removeEventListener("fullscreenchange", h);
  }, []);

  // ── Like / Dislike ──
  const handleLike = () => {
    if (liked) { setLiked(false); }
    else { setLiked(true); if (disliked) setDisliked(false); }
  };
  const handleDislike = () => {
    if (disliked) { setDisliked(false); }
    else { setDisliked(true); if (liked) setLiked(false); }
  };

  // ── Comment actions ──
  const submitComment = () => {
    const text = commentInput.trim();
    if (!text) return;
    const acct = window.__googleAccount;
    const newComment = {
      id: Date.now(),
      author: acct?.name || "You",
      avatar: acct?.avatar || null,
      avatarLetter: (acct?.name?.[0] || "Y").toUpperCase(),
      color: "#ff0000",
      text, likes: 0, time: "Just now", liked: false, replies: [],
      isReal: !!acct,
    };
    setComments(prev => [newComment, ...prev]);
    setCommentInput("");
    setCommentFocus(false);
  };

  const likeComment = (cid) => {
    setComments(prev => prev.map(c =>
      c.id === cid ? { ...c, liked: !c.liked, likes: c.liked ? c.likes - 1 : c.likes + 1 } : c
    ));
  };

  const likeReply = (cid, rid) => {
    setComments(prev => prev.map(c => c.id === cid
      ? { ...c, replies: c.replies.map(r => r.id === rid
          ? { ...r, liked: !r.liked, likes: r.liked ? r.likes - 1 : r.likes + 1 }
          : r ) }
      : c
    ));
  };

  const submitReply = (cid) => {
    const text = (replyInput[cid] || "").trim();
    if (!text) return;
    const acct = window.__googleAccount;
    const newReply = {
      id: Date.now(),
      author: acct?.name || "You",
      avatar: acct?.avatar || null,
      avatarLetter: (acct?.name?.[0] || "Y").toUpperCase(),
      color: "#ff0000",
      text, likes: 0, time: "Just now",
      isReal: !!acct,
    };
    setComments(prev => prev.map(c => c.id === cid ? { ...c, replies: [...c.replies, newReply] } : c));
    setReplyInput(prev => ({ ...prev, [cid]: "" }));
    setShowReplyBox(prev => ({ ...prev, [cid]: false }));
    setExpandedReplies(prev => ({ ...prev, [cid]: true }));
  };

  const sortedComments = useMemo(() => {
    if (commentSort === "new") return [...comments].sort((a,b) => b.id - a.id);
    return [...comments].sort((a,b) => b.likes - a.likes);
  }, [comments, commentSort]);

  // ── Related videos — real API search by title/channel ──
  const [relatedVideos, setRelatedVideos] = useState(
    (playlist?.length ? playlist : SAMPLE_VIDEOS).filter(v => v.id !== video.id)
  );
  const [relatedLoading, setRelatedLoading] = useState(false);

  useEffect(() => {
    // Reset to playlist filter first
    setRelatedVideos((playlist?.length ? playlist : SAMPLE_VIDEOS).filter(v => v.id !== video.id));
    if (!video.id) return;
    setRelatedLoading(true);
    // Search by channel name or first 3 words of title
    const q = video.channel && video.channel !== "YouTube"
      ? video.channel
      : video.title.split(" ").slice(0, 3).join(" ");
    apiSearch(q, 12).then(result => {
      if (result?.videos.length > 0) {
        setRelatedVideos(result.videos.filter(v => v.id !== video.id));
      }
      setRelatedLoading(false);
    }).catch(() => { setRelatedLoading(false); });
  }, [video.id]);

  const related = relatedVideos;

  // Video metadata — use real API data if available, else fallback
  const displayViewCount = realViewCount
    ? fmtNum(realViewCount) + " views"
    : (Math.floor(Math.random()*900+100)*1000000).toLocaleString() + " views";
  const displayUploadDate = realPublishedAt
    ? relTime(realPublishedAt)
    : (() => { const dates=["Jan 15, 2022","Mar 8, 2021","Nov 3, 2020"]; return dates[Math.floor(Math.random()*dates.length)]; })();
  const displayLikeCount = realLikeCount || (Math.floor(Math.random()*900+100) + "K");
  const displayDescription = realDescription
    || `${video.title}\n\nOfficial music video from ${video.channel}.\n\n📺 Subscribe: https://youtube.com\n#Music #${video.channel.replace(/ /g,"")} #Official`;
  const displaySubs = channelSubs
    ? fmtNum(channelSubs) + " subscribers"
    : (Math.floor(Math.random()*49+1)*100).toLocaleString()+"K subscribers";

  // ── QUALITY OPTIONS ──
  const QUALITY_OPTS = ["Auto","2160p 4K","1440p","1080p HD","720p","480p","360p","240p","144p"];
  const SPEED_OPTS   = [0.25, 0.5, 0.75, 1, 1.25, 1.5, 1.75, 2];

  return (
    <div style={{ display: "flex", flexDirection: "column", minHeight: "100vh", background: "#0f0f0f" }}>
      <style>{`
        .yt-seek-bar::-webkit-slider-thumb {
          -webkit-appearance: none; width: 14px; height: 14px;
          background: #fff; border-radius: 50%; cursor: pointer;
          box-shadow: 0 0 4px rgba(0,0,0,0.5);
        }
        .yt-vol-bar::-webkit-slider-thumb {
          -webkit-appearance: none; width: 12px; height: 12px;
          background: #fff; border-radius: 50%; cursor: pointer;
        }
        .comment-input-box::placeholder { color: #555; }
        .comment-input-box:focus { border-bottom-color: #fff; outline: none; }
        @keyframes ytFadeIn { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:translateY(0)} }
        .yt-comment { animation: ytFadeIn 0.2s ease; }
        .yt-reply-box { animation: ytFadeIn 0.15s ease; }
        .yt-chip-active { position:relative; }
        .yt-chip-active::after { content:""; position:absolute; bottom:-1px; left:0; right:0; height:2px; background:#fff; border-radius:1px; }
      `}</style>

      {/* ══════════════════════════════════════════
          1. VIDEO PLAYER
      ══════════════════════════════════════════ */}
      <div
        data-yt-player="true"
        style={{ position: "relative", width: "100%", paddingBottom: "56.25%", background: "#000", flexShrink: 0 }}
        onClick={revealControls}
      >
        {/* IFrame mount point */}
        <div ref={playerDivRef} style={{ position: "absolute", inset: 0, width: "100%", height: "100%" }} />

        {/* ── Embed Error Fallback ── */}
        {embedError && (
          <div style={{
            position: "absolute", inset: 0, background: "#0f0f0f",
            display: "flex", flexDirection: "column",
            alignItems: "center", justifyContent: "center",
            gap: 12, padding: 20, zIndex: 20,
          }}>
            <img src={video.thumb} alt=""
              style={{ width: "80%", maxWidth: 260, borderRadius: 10, objectFit: "cover", opacity: 0.5 }} />
            <div style={{ textAlign: "center" }}>
              <div style={{ color: "#ff4444", fontSize: 13, fontWeight: 600, marginBottom: 4 }}>
                ⚠ {embedError.code === 100 ? "Video unavailable" : "Embedding disabled"}
              </div>
              <div style={{ color: "#aaa", fontSize: 11, lineHeight: 1.5 }}>
                {embedError.code === 100
                  ? "This video is private or removed."
                  : "This video cannot be embedded.\nThe owner has disabled it."}
              </div>
            </div>
            <div style={{ display: "flex", gap: 10, flexWrap: "wrap", justifyContent: "center" }}>
              <a href={`https://www.youtube.com/watch?v=${video.id}`}
                target="_blank" rel="noopener noreferrer"
                style={{
                  background: "#ff0000", color: "#fff",
                  borderRadius: 22, padding: "10px 18px",
                  fontSize: 13, fontWeight: 700, textDecoration: "none",
                  display: "flex", alignItems: "center", gap: 6,
                }}>
                <svg width="15" height="15" viewBox="0 0 24 24" fill="#fff"><path d="M10 15l5.19-3L10 9v6m11.56-7.83c.13.47.22 1.1.28 1.9.07.8.1 1.49.1 2.09L22 12c0 2.19-.16 3.8-.44 4.83-.25.9-.83 1.48-1.73 1.73-.47.13-1.33.22-2.65.28-1.3.07-2.49.1-3.59.1L12 19c-4.19 0-6.8-.16-7.83-.44-.9-.25-1.48-.83-1.73-1.73-.13-.47-.22-1.1-.28-1.9-.07-.8-.1-1.49-.1-2.09L2 12c0-2.19.16-3.8.44-4.83.25-.9.83-1.48 1.73-1.73.47-.13 1.33-.22 2.65-.28 1.3-.07 2.49-.1 3.59-.1L12 5c4.19 0 6.8.16 7.83.44.9.25 1.48.83 1.73 1.73z"/></svg>
                Watch on YouTube
              </a>
              <button onClick={onNext}
                style={{
                  background: "#272727", color: "#f1f1f1",
                  border: "1px solid #444", borderRadius: 22,
                  padding: "10px 18px", fontSize: 13, fontWeight: 600,
                  cursor: "pointer", display: "flex", alignItems: "center", gap: 6,
                }}>
                <svg width="15" height="15" viewBox="0 0 24 24" fill="#f1f1f1"><path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/></svg>
                Skip to Next
              </button>
            </div>
          </div>
        )}

        {/* ── Toast notification ── */}
        {toast && (
          <div style={{
            position: "absolute", bottom: 60, left: "50%", transform: "translateX(-50%)",
            background: "#0009", borderRadius: 6, padding: "6px 14px",
            color: "#fff", fontSize: 12, zIndex: 30, whiteSpace: "nowrap",
            animation: "fadeIn 0.2s ease",
          }}>{toast}</div>
        )}

        {/* ── Controls Overlay ── */}
        <div style={{
          position: "absolute", inset: 0,
          display: "flex", flexDirection: "column", justifyContent: "space-between",
          background: showCtrl ? "linear-gradient(to bottom, #000a 0%, transparent 22%, transparent 65%, #000e 100%)" : "transparent",
          transition: "background 0.3s ease",
          pointerEvents: showCtrl ? "auto" : "none",
        }}>

          {/* ── Top row: Back + Title + Minimize + More ── */}
          <div style={{ display: "flex", alignItems: "center", gap: 8, padding: "10px 12px 6px" }}>
            <button onClick={onClose} style={{ background: "none", border: "none", cursor: "pointer", padding: 6, display: "flex", alignItems: "center", justifyContent: "center", borderRadius: "50%" }}>
              <svg width="22" height="22" viewBox="0 0 24 24"><path fill="#fff" d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
            </button>
            <span style={{ flex: 1, color: "#fff", fontSize: 13, fontWeight: 500,
              overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap",
              textShadow: "0 1px 4px #000" }}>{video.title}</span>
            {/* Minimize to mini-player */}
            {onMinimize && (
              <button onClick={onMinimize} style={{ background: "none", border: "none", cursor: "pointer", padding: 6, display: "flex", alignItems: "center" }}
                title="Minimize">
                <svg width="20" height="20" viewBox="0 0 24 24"><path fill="#fff" d="M19 13H5v-2h14v2z"/></svg>
              </button>
            )}
            {/* Cast icon */}
            <button style={{ background: "none", border: "none", cursor: "pointer", padding: 6, display: "flex" }}>
              <svg width="20" height="20" viewBox="0 0 24 24"><path fill="#fff" d="M1 18v3h3c0-1.66-1.34-3-3-3zm0-4v2c2.76 0 5 2.24 5 5h2c0-3.87-3.13-7-7-7zm18-7H5c-1.1 0-2 .9-2 2v3h2v-3h14v10h-5v2h5c1.1 0 2-.9 2-2V9c0-1.1-.9-2-2-2zM1 10v2c4.97 0 9 4.03 9 9h2c0-6.08-4.93-11-11-11z"/></svg>
            </button>
            {/* More vertical */}
            <button style={{ background: "none", border: "none", cursor: "pointer", padding: 6, display: "flex" }}>
              <svg width="20" height="20" viewBox="0 0 24 24"><path fill="#fff" d="M12 8c1.1 0 2-.9 2-2s-.9-2-2-2-2 .9-2 2 .9 2 2 2zm0 2c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zm0 6c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2z"/></svg>
            </button>
          </div>

          {/* ── Center: Prev + Play/Pause + Next + skip labels ── */}
          <div style={{ display: "flex", alignItems: "center", justifyContent: "center", gap: 32 }}>
            {/* Prev */}
            <button onClick={(e) => { e.stopPropagation(); onPrev?.(); }} style={{ background: "none", border: "none", cursor: "pointer", padding: 8 }}>
              <svg width="30" height="30" viewBox="0 0 24 24" fill="#fff"><path d="M6 6h2v12H6zm3.5 6 8.5 6V6z"/></svg>
            </button>
            {/* Replay 10 */}
            <button onClick={(e) => { e.stopPropagation(); skipSec(-10); }} style={{ background: "none", border: "none", cursor: "pointer", padding: 6, display: "flex", flexDirection: "column", alignItems: "center" }}>
              <svg width="30" height="30" viewBox="0 0 24 24" fill="#fff">
                <path d="M12 5V1L7 6l5 5V7c3.31 0 6 2.69 6 6s-2.69 6-6 6-6-2.69-6-6H4c0 4.42 3.58 8 8 8s8-3.58 8-8-3.58-8-8-8z"/>
                <text x="12" y="15.5" textAnchor="middle" fontSize="5.5" fill="#fff" fontWeight="bold" fontFamily="Arial">10</text>
              </svg>
            </button>
            {/* Play/Pause — big */}
            <button onClick={(e) => { e.stopPropagation(); togglePlay(); }} style={{ background: "rgba(0,0,0,0.45)", border: "none", cursor: "pointer", borderRadius: "50%", width: 62, height: 62, display: "flex", alignItems: "center", justifyContent: "center", backdropFilter: "blur(4px)" }}>
              {playing
                ? <svg width="30" height="30" viewBox="0 0 24 24" fill="#fff"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
                : <svg width="30" height="30" viewBox="0 0 24 24" fill="#fff"><path d="M8 5v14l11-7z"/></svg>
              }
            </button>
            {/* Forward 10 */}
            <button onClick={(e) => { e.stopPropagation(); skipSec(10); }} style={{ background: "none", border: "none", cursor: "pointer", padding: 6, display: "flex", flexDirection: "column", alignItems: "center" }}>
              <svg width="30" height="30" viewBox="0 0 24 24" fill="#fff">
                <path d="M12 5V1l5 5-5 5V7c-3.31 0-6 2.69-6 6s2.69 6 6 6 6-2.69 6-6h2c0 4.42-3.58 8-8 8s-8-3.58-8-8 3.58-8 8-8z"/>
                <text x="12" y="15.5" textAnchor="middle" fontSize="5.5" fill="#fff" fontWeight="bold" fontFamily="Arial">10</text>
              </svg>
            </button>
            {/* Next */}
            <button onClick={(e) => { e.stopPropagation(); onNext?.(); }} style={{ background: "none", border: "none", cursor: "pointer", padding: 8 }}>
              <svg width="30" height="30" viewBox="0 0 24 24" fill="#fff"><path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/></svg>
            </button>
          </div>

          {/* ── Bottom: seek bar + time + controls row ── */}
          <div style={{ padding: "0 0 4px" }}>
            {/* Seek bar (custom range input) */}
            <div style={{ padding: "0 12px 6px", position: "relative" }} onClick={e => e.stopPropagation()}>
              <div style={{ position: "relative", height: 18, display: "flex", alignItems: "center" }}>
                {/* Buffered track */}
                <div style={{ position: "absolute", left: 0, right: 0, height: 3, background: "rgba(255,255,255,0.2)", borderRadius: 2 }} />
                <div style={{ position: "absolute", left: 0, height: 3, background: "rgba(255,255,255,0.45)", borderRadius: 2, width: `${buffered}%` }} />
                {/* Playback fill */}
                <div style={{ position: "absolute", left: 0, height: 3, background: "#ff0000", borderRadius: 2, width: `${duration ? (progress/duration)*100 : 0}%`, transition: isSeeking ? "none" : "width 0.1s linear" }} />
                {/* Seek thumb */}
                <input
                  ref={seekBarRef}
                  type="range" min={0} max={duration || 100} step={0.1}
                  value={progress}
                  onChange={handleSeek}
                  onMouseDown={() => setIsSeeking(true)}
                  onMouseUp={() => setIsSeeking(false)}
                  onTouchStart={() => setIsSeeking(true)}
                  onTouchEnd={() => setIsSeeking(false)}
                  className="yt-seek-bar"
                  style={{ position: "absolute", left: 0, right: 0, width: "100%", opacity: 0, height: 18, cursor: "pointer", zIndex: 2 }}
                />
                {/* Visual thumb dot */}
                <div style={{
                  position: "absolute", top: "50%", transform: "translateY(-50%)",
                  left: `${duration ? (progress/duration)*100 : 0}%`,
                  width: isSeeking ? 16 : 12, height: isSeeking ? 16 : 12,
                  background: "#ff0000", borderRadius: "50%",
                  marginLeft: isSeeking ? -8 : -6,
                  transition: "width 0.1s, height 0.1s, margin 0.1s",
                  boxShadow: isSeeking ? "0 0 0 4px rgba(255,0,0,0.3)" : "none",
                  pointerEvents: "none", zIndex: 1,
                }} />
              </div>
            </div>

            {/* Controls row */}
            <div style={{ display: "flex", alignItems: "center", gap: 4, padding: "0 10px 6px" }} onClick={e => e.stopPropagation()}>
              {/* Play/Pause small */}
              <button onClick={togglePlay} style={{ background: "none", border: "none", cursor: "pointer", padding: 4, display: "flex" }}>
                {playing
                  ? <svg width="20" height="20" viewBox="0 0 24 24" fill="#fff"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
                  : <svg width="20" height="20" viewBox="0 0 24 24" fill="#fff"><path d="M8 5v14l11-7z"/></svg>
                }
              </button>
              {/* Next small */}
              <button onClick={() => onNext?.()} style={{ background: "none", border: "none", cursor: "pointer", padding: 4, display: "flex" }}>
                <svg width="18" height="18" viewBox="0 0 24 24" fill="#fff"><path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/></svg>
              </button>
              {/* Volume */}
              <button onClick={toggleMute} style={{ background: "none", border: "none", cursor: "pointer", padding: 4, display: "flex" }}>
                {muted
                  ? <svg width="18" height="18" viewBox="0 0 24 24" fill="#fff"><path d="M16.5 12c0-1.77-1.02-3.29-2.5-4.03v2.21l2.45 2.45c.03-.2.05-.41.05-.63zm2.5 0c0 .94-.2 1.82-.54 2.64l1.51 1.51C20.63 14.91 21 13.5 21 12c0-4.28-2.99-7.86-7-8.77v2.06c2.89.86 5 3.54 5 6.71zM4.27 3L3 4.27 7.73 9H3v6h4l5 5v-6.73l4.25 4.25c-.67.52-1.42.93-2.25 1.18v2.06c1.38-.31 2.63-.95 3.69-1.81L19.73 21 21 19.73l-9-9L4.27 3zM12 4L9.91 6.09 12 8.18V4z"/></svg>
                  : <svg width="18" height="18" viewBox="0 0 24 24" fill="#fff"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/></svg>
                }
              </button>
              {/* Time */}
              <span style={{ color: "#fff", fontSize: 11, flex: 1, fontVariantNumeric: "tabular-nums" }}>
                {fmtTime(progress)} / {fmtTime(duration)}
              </span>
              {/* Speed badge */}
              <div style={{ position: "relative" }}>
                <button onClick={() => { setShowSpeed(s => !s); setShowQuality(false); }} style={{ background: "rgba(255,255,255,0.15)", border: "none", cursor: "pointer", borderRadius: 4, padding: "2px 7px", color: "#fff", fontSize: 11, fontWeight: 700 }}>
                  {playbackRate === 1 ? "1×" : `${playbackRate}×`}
                </button>
                {showSpeed && (
                  <div style={{ position: "absolute", bottom: "100%", right: 0, background: "#1f1f1f", borderRadius: 8, padding: "6px 0", minWidth: 90, boxShadow: "0 4px 20px #000a", zIndex: 100 }}>
                    {SPEED_OPTS.map(s => (
                      <div key={s} onClick={() => changeSpeed(s)} style={{ padding: "9px 16px", color: playbackRate === s ? "#ff0000" : "#f1f1f1", fontSize: 13, cursor: "pointer", fontWeight: playbackRate === s ? 700 : 400, background: playbackRate === s ? "#ffffff0d" : "transparent" }}
                        onMouseEnter={e => e.currentTarget.style.background = "#ffffff10"}
                        onMouseLeave={e => e.currentTarget.style.background = playbackRate === s ? "#ffffff0d" : "transparent"}>
                        {s === 1 ? "Normal" : `${s}×`}
                        {playbackRate === s && <span style={{ float: "right", color: "#ff0000" }}>✓</span>}
                      </div>
                    ))}
                  </div>
                )}
              </div>
              {/* Quality */}
              <div style={{ position: "relative" }}>
                <button onClick={() => { setShowQuality(q => !q); setShowSpeed(false); }} style={{ background: "rgba(255,255,255,0.15)", border: "none", cursor: "pointer", borderRadius: 4, padding: "2px 6px", color: "#fff", fontSize: 10, fontWeight: 700 }}>
                  {quality === "Auto" ? "HD" : quality.split("p")[0]+"p"}
                </button>
                {showQuality && (
                  <div style={{ position: "absolute", bottom: "100%", right: 0, background: "#1f1f1f", borderRadius: 8, padding: "6px 0", minWidth: 130, boxShadow: "0 4px 20px #000a", zIndex: 100 }}>
                    <div style={{ padding: "8px 16px 6px", color: "#aaa", fontSize: 11, borderBottom: "1px solid #2a2a2a", marginBottom: 4 }}>Quality</div>
                    {QUALITY_OPTS.map(q => (
                      <div key={q} onClick={() => { setQuality(q); setShowQuality(false); }} style={{ padding: "9px 16px", color: quality === q ? "#ff0000" : "#f1f1f1", fontSize: 13, cursor: "pointer", fontWeight: quality === q ? 700 : 400, background: quality === q ? "#ffffff0d" : "transparent", display: "flex", alignItems: "center", gap: 8 }}
                        onMouseEnter={e => e.currentTarget.style.background = "#ffffff10"}
                        onMouseLeave={e => e.currentTarget.style.background = quality === q ? "#ffffff0d" : "transparent"}>
                        {q} {q.includes("4K") && <span style={{ fontSize: 9, background: "#ff0000", color: "#fff", borderRadius: 3, padding: "1px 4px", fontWeight: 700 }}>4K</span>}
                        {q === "1080p HD" && <span style={{ fontSize: 9, background: "#065fd4", color: "#fff", borderRadius: 3, padding: "1px 4px", fontWeight: 700 }}>HD</span>}
                        {quality === q && <span style={{ marginLeft: "auto", color: "#ff0000" }}>✓</span>}
                      </div>
                    ))}
                  </div>
                )}
              </div>
              {/* Fullscreen */}
              <button onClick={toggleFullscreen} style={{ background: "none", border: "none", cursor: "pointer", padding: 4, display: "flex" }}>
                {isFullscreen
                  ? <svg width="18" height="18" viewBox="0 0 24 24" fill="#fff"><path d="M5 16h3v3h2v-5H5v2zm3-8H5v2h5V5H8v3zm6 11h2v-3h3v-2h-5v5zm2-11V5h-2v5h5V8h-3z"/></svg>
                  : <svg width="18" height="18" viewBox="0 0 24 24" fill="#fff"><path d="M7 14H5v5h5v-2H7v-3zm-2-4h2V7h3V5H5v5zm12 7h-3v2h5v-5h-2v3zM14 5v2h3v3h2V5h-5z"/></svg>
                }
              </button>
            </div>
          </div>
        </div>

        {/* Backdrop click to close speed/quality dropdowns */}
        {(showSpeed || showQuality) && (
          <div style={{ position: "absolute", inset: 0, zIndex: 50 }} onClick={() => { setShowSpeed(false); setShowQuality(false); }} />
        )}
      </div>

      {/* ══════════════════════════════════════════
          2. VIDEO TITLE + INFO COLLAPSED
      ══════════════════════════════════════════ */}
      <div style={{ padding: "12px 14px 0" }}>
        {/* Title */}
        <div style={{ color: "#f1f1f1", fontSize: 16, fontWeight: 600, lineHeight: 1.45, marginBottom: 4,
          display: descExpanded ? "block" : "-webkit-box",
          WebkitLineClamp: descExpanded ? undefined : 2,
          WebkitBoxOrient: "vertical", overflow: descExpanded ? "visible" : "hidden",
        }}>{video.title}</div>

        {/* Views + Date + expand chevron */}
        <div style={{ display: "flex", alignItems: "center", gap: 6, marginBottom: 10 }}>
          <span style={{ color: "#aaa", fontSize: 13 }}>{displayViewCount}</span>
          <span style={{ color: "#555", fontSize: 13 }}>•</span>
          <span style={{ color: "#aaa", fontSize: 13 }}>{displayUploadDate}</span>
          <span style={{ color: "#aaa", fontSize: 12, marginLeft: "auto", cursor: "pointer", display: "flex", alignItems: "center", gap: 2 }}
            onClick={() => setDescExpanded(d => !d)}>
            {descExpanded ? "less" : "more"}
            <svg width="14" height="14" viewBox="0 0 24 24" fill="#aaa" style={{ transform: descExpanded ? "rotate(180deg)" : "rotate(0deg)", transition: "transform 0.2s" }}>
              <path d="M7 10l5 5 5-5z"/>
            </svg>
          </span>
        </div>

        {/* Expanded description */}
        {descExpanded && (
          <div style={{ background: "#1a1a1a", borderRadius: 10, padding: "12px 14px", marginBottom: 10, animation: "ytFadeIn 0.2s ease" }}>
            <pre style={{ color: "#e0e0e0", fontSize: 13, lineHeight: 1.7, whiteSpace: "pre-wrap", fontFamily: "inherit", margin: 0 }}>{displayDescription}</pre>
          </div>
        )}
      </div>

      {/* ══════════════════════════════════════════
          3. CHANNEL ROW + SUBSCRIBE
      ══════════════════════════════════════════ */}
      <div style={{ display: "flex", alignItems: "center", gap: 10, padding: "6px 14px 12px" }}>
        <img
          src={channelAvatar || `https://i.pravatar.cc/40?u=${video.channel}`}
          alt=""
          style={{ width: 40, height: 40, borderRadius: "50%", objectFit: "cover", flexShrink: 0, border: "2px solid #1a1a1a" }}
          onError={e => { e.target.src = `https://i.pravatar.cc/40?u=${video.channel}`; }}
        />
        <div style={{ flex: 1, minWidth: 0 }}>
          <div style={{ color: "#f1f1f1", fontSize: 14, fontWeight: 600,
            overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{video.channel}</div>
          <div style={{ color: "#aaa", fontSize: 12, marginTop: 1 }}>
            {displaySubs}
          </div>
        </div>
        {/* Subscribe button */}
        <button onClick={() => setSubscribed(s => !s)} style={{
          background: subscribed ? "#272727" : "#f1f1f1",
          border: "none", borderRadius: 20, padding: "9px 16px",
          color: subscribed ? "#f1f1f1" : "#0f0f0f",
          fontSize: 14, fontWeight: 700, cursor: "pointer",
          display: "flex", alignItems: "center", gap: 6,
          transition: "all 0.2s ease",
          flexShrink: 0,
        }}>
          {subscribed ? (
            <>
              <svg width="14" height="14" viewBox="0 0 24 24" fill="#f1f1f1"><path d="M14 6l-1-2H5v17h2v-7h5l1 2h7V6h-6zm4 8h-4l-1-2H7V6h5l1 2h5v6z"/></svg>
              Subscribed
            </>
          ) : "Subscribe"}
        </button>
      </div>

      {/* ══════════════════════════════════════════
          4. LIKE / DISLIKE / SHARE / CLIP / SAVE ROW
      ══════════════════════════════════════════ */}
      <div style={{
        display: "flex", alignItems: "center", gap: 8,
        padding: "0 14px 14px", overflowX: "auto",
        msOverflowStyle: "none", scrollbarWidth: "none",
      }}>
        {/* Like + Dislike pill */}
        <div style={{ display: "flex", borderRadius: 20, overflow: "hidden", background: "#272727", flexShrink: 0 }}>
          {/* Like */}
          <button onClick={handleLike} style={{
            display: "flex", alignItems: "center", gap: 6,
            background: "none", border: "none", cursor: "pointer",
            padding: "9px 14px", color: liked ? "#fff" : "#f1f1f1",
            borderRight: "1px solid #3f3f3f",
          }}>
            <svg width="18" height="18" viewBox="0 0 24 24" fill={liked ? "#fff" : "none"} stroke={liked ? "none" : "#f1f1f1"} strokeWidth="2">
              <path d="M14 9V5a3 3 0 0 0-3-3l-4 9v11h11.28a2 2 0 0 0 2-1.7l1.38-9a2 2 0 0 0-2-2.3H14z"/>
              <path d="M7 22H4a2 2 0 0 1-2-2v-7a2 2 0 0 1 2-2h3" fill={liked ? "#fff" : "none"} stroke={liked ? "none" : "#f1f1f1"}/>
            </svg>
            <span style={{ fontSize: 13, fontWeight: 600, color: liked ? "#fff" : "#f1f1f1" }}>{displayLikeCount}</span>
          </button>
          {/* Dislike */}
          <button onClick={handleDislike} style={{
            display: "flex", alignItems: "center",
            background: "none", border: "none", cursor: "pointer",
            padding: "9px 14px", color: disliked ? "#fff" : "#f1f1f1",
          }}>
            <svg width="18" height="18" viewBox="0 0 24 24" fill={disliked ? "#fff" : "none"} stroke={disliked ? "none" : "#f1f1f1"} strokeWidth="2">
              <path d="M10 15v4a3 3 0 0 0 3 3l4-9V2H5.72a2 2 0 0 0-2 1.7l-1.38 9a2 2 0 0 0 2 2.3H10z"/>
              <path d="M17 2h2.67A2.31 2.31 0 0 1 22 4v7a2.31 2.31 0 0 1-2.33 2H17" fill={disliked ? "#fff" : "none"} stroke={disliked ? "none" : "#f1f1f1"}/>
            </svg>
          </button>
        </div>

        {/* Share */}
        <button onClick={async () => {
          try {
            if (navigator.share) await navigator.share({ title: video.title, url: `https://youtu.be/${video.id}` });
            else await navigator.clipboard.writeText(`https://youtu.be/${video.id}`);
          } catch {}
        }} style={{ display: "flex", alignItems: "center", gap: 7, background: "#272727", border: "none", borderRadius: 20, padding: "9px 14px", color: "#f1f1f1", fontSize: 13, fontWeight: 600, cursor: "pointer", flexShrink: 0 }}>
          <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="#f1f1f1" strokeWidth="2" strokeLinecap="round">
            <path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8"/><polyline points="16 6 12 2 8 6"/><line x1="12" y1="2" x2="12" y2="15"/>
          </svg>
          Share
        </button>

        {/* Clip */}
        <button style={{ display: "flex", alignItems: "center", gap: 7, background: "#272727", border: "none", borderRadius: 20, padding: "9px 14px", color: "#f1f1f1", fontSize: 13, fontWeight: 600, cursor: "pointer", flexShrink: 0 }}>
          <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="#f1f1f1" strokeWidth="2" strokeLinecap="round">
            <path d="M23 7l-7 5 7 5V7z"/><rect x="1" y="5" width="15" height="14" rx="2" ry="2"/>
          </svg>
          Clip
        </button>

        {/* Save */}
        <button onClick={() => onAddToPlaylist(video)} style={{ display: "flex", alignItems: "center", gap: 7, background: "#272727", border: "none", borderRadius: 20, padding: "9px 14px", color: "#f1f1f1", fontSize: 13, fontWeight: 600, cursor: "pointer", flexShrink: 0 }}>
          <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="#f1f1f1" strokeWidth="2" strokeLinecap="round">
            <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/>
          </svg>
          Save
        </button>

        {/* Add to queue */}
        <button onClick={() => addToQueue(video)} style={{ display: "flex", alignItems: "center", gap: 7, background: isQueued(video.id) ? "#ff000022" : "#272727", border: isQueued(video.id) ? "1px solid #ff000066" : "none", borderRadius: 20, padding: "9px 14px", color: isQueued(video.id) ? "#ff6666" : "#f1f1f1", fontSize: 13, fontWeight: 600, cursor: "pointer", flexShrink: 0 }}>
          <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M3 6h18M3 12h18M3 18h12"/></svg>
          {isQueued(video.id) ? "Queued" : "Queue"}
        </button>

        {/* Download (visual only) */}
        <button style={{ display: "flex", alignItems: "center", gap: 7, background: "#272727", border: "none", borderRadius: 20, padding: "9px 14px", color: "#f1f1f1", fontSize: 13, fontWeight: 600, cursor: "pointer", flexShrink: 0 }}>
          <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="#f1f1f1" strokeWidth="2" strokeLinecap="round">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/>
          </svg>
          Download
        </button>
      </div>

      {/* Divider */}
      <div style={{ height: 1, background: "#272727", margin: "0 0 4px" }} />

      {/* ══════════════════════════════════════════
          5. TABS: Comments | Related | Chapters
      ══════════════════════════════════════════ */}
      <div style={{
        display: "flex", borderBottom: "1px solid #272727",
        position: "sticky", top: 0, zIndex: 100, background: "#0f0f0f",
      }}>
        {[
          { id: "comments", label: `Comments ${sortedComments.length > 0 ? sortedComments.length.toLocaleString() : ""}` },
          { id: "related",  label: "Related" },
          { id: "chapters", label: "Chapters" },
        ].map(tab => (
          <button key={tab.id} onClick={() => setActiveChipPl(tab.id)} style={{
            flex: 1, background: "none", border: "none", cursor: "pointer",
            padding: "12px 6px 10px", color: activeChipPl === tab.id ? "#f1f1f1" : "#aaa",
            fontSize: 13, fontWeight: activeChipPl === tab.id ? 700 : 500,
            borderBottom: activeChipPl === tab.id ? "2px solid #f1f1f1" : "2px solid transparent",
            transition: "color 0.15s, border-color 0.15s",
          }}>{tab.label}</button>
        ))}
      </div>

      {/* ══════════════════════════════════════════
          6A. COMMENTS SECTION
      ══════════════════════════════════════════ */}
      {activeChipPl === "comments" && (
        <div style={{ padding: "0 0 90px" }}>

          {/* Sort row */}
          <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", padding: "12px 14px 8px" }}>
            <span style={{ color: "#f1f1f1", fontSize: 15, fontWeight: 700 }}>
              {sortedComments.length.toLocaleString()} Comments
            </span>
            <button onClick={() => setCommentSort(s => s === "top" ? "new" : "top")} style={{
              background: "none", border: "none", cursor: "pointer", display: "flex", alignItems: "center", gap: 6, color: "#f1f1f1"
            }}>
              <svg width="16" height="16" viewBox="0 0 24 24" fill="#f1f1f1"><path d="M3 18h6v-2H3v2zM3 6v2h18V6H3zm0 7h12v-2H3v2z"/></svg>
              <span style={{ fontSize: 13, fontWeight: 600 }}>Sort by: {commentSort === "top" ? "Top" : "Newest"}</span>
            </button>
          </div>

          {/* Add comment row */}
          <div style={{ display: "flex", gap: 10, padding: "0 14px 16px", alignItems: "flex-start" }}>
            {/* User avatar — Google account or default */}
            <div style={{ width: 36, height: 36, borderRadius: "50%", overflow: "hidden", background: "linear-gradient(135deg, #ff0000, #cc0000)", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 14, fontWeight: 700, color: "#fff", flexShrink: 0 }}>
              {/* googleAccount injected via prop, use window fallback */}
              <span style={{ fontSize: 14, fontWeight: 700 }}>
                {(window.__googleAccount?.avatar)
                  ? <img src={window.__googleAccount.avatar} style={{ width: 36, height: 36, objectFit: "cover" }} alt="" />
                  : (window.__googleAccount?.name?.[0]?.toUpperCase() || "YO")
                }
              </span>
            </div>
            <div style={{ flex: 1 }}>
              <input
                value={commentInput}
                onChange={e => setCommentInput(e.target.value)}
                onFocus={() => setCommentFocus(true)}
                onKeyDown={e => { if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); if (commentInput.trim()) submitComment(); } }}
                placeholder="Add a comment..."
                className="comment-input-box"
                style={{
                  width: "100%", background: "none", border: "none",
                  borderBottom: commentFocus ? "1px solid #f1f1f1" : "1px solid #3f3f3f",
                  color: "#f1f1f1", fontSize: 14, padding: "6px 0",
                  outline: "none", transition: "border-color 0.2s",
                }}
              />
              {commentFocus && (
                <div style={{ display: "flex", justifyContent: "flex-end", gap: 8, marginTop: 10, animation: "ytFadeIn 0.15s ease" }}>
                  <button onClick={() => { setCommentFocus(false); setCommentInput(""); }} style={{ background: "none", border: "none", borderRadius: 20, padding: "8px 14px", color: "#f1f1f1", fontSize: 13, cursor: "pointer", fontWeight: 600 }}>
                    Cancel
                  </button>
                  <button onClick={submitComment} disabled={!commentInput.trim()} style={{
                    background: commentInput.trim() ? "#3ea6ff" : "#3f3f3f",
                    border: "none", borderRadius: 20, padding: "8px 16px",
                    color: commentInput.trim() ? "#0f0f0f" : "#717171",
                    fontSize: 13, cursor: commentInput.trim() ? "pointer" : "default", fontWeight: 700,
                    transition: "all 0.2s",
                  }}>Comment</button>
                </div>
              )}
            </div>
          </div>

          {/* Comments list */}
          {sortedComments.map(comment => (
            <div key={comment.id} className="yt-comment" style={{ padding: "0 14px 16px" }}>
              <div style={{ display: "flex", gap: 10, alignItems: "flex-start" }}>
                {/* Avatar — real URL or letter */}
                <div style={{ width: 36, height: 36, borderRadius: "50%", overflow: "hidden", flexShrink: 0, background: comment.color }}>
                  {comment.isReal && typeof comment.avatar === "string" && comment.avatar.startsWith("http") ? (
                    <img src={comment.avatar} alt="" style={{ width: "100%", height: "100%", objectFit: "cover" }} onError={e => { e.target.style.display="none"; }} />
                  ) : (
                    <div style={{ width: "100%", height: "100%", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 13, fontWeight: 700, color: "#fff" }}>
                      {comment.avatarLetter || comment.avatar || "?"}
                    </div>
                  )}
                </div>
                <div style={{ flex: 1, minWidth: 0 }}>
                  {/* Author + time */}
                  <div style={{ display: "flex", alignItems: "center", gap: 6, marginBottom: 4 }}>
                    <span style={{ color: "#f1f1f1", fontSize: 13, fontWeight: 600 }}>{comment.author}</span>
                    <span style={{ color: "#717171", fontSize: 12 }}>{comment.time}</span>
                  </div>
                  {/* Comment text */}
                  <div style={{ color: "#f1f1f1", fontSize: 14, lineHeight: 1.6, marginBottom: 8, wordBreak: "break-word" }}>
                    {comment.text}
                  </div>
                  {/* Like / Dislike / Reply row */}
                  <div style={{ display: "flex", alignItems: "center", gap: 4 }}>
                    {/* Thumbs up */}
                    <button onClick={() => likeComment(comment.id)} style={{ background: "none", border: "none", cursor: "pointer", display: "flex", alignItems: "center", gap: 5, padding: "4px 6px", borderRadius: 20, color: comment.liked ? "#3ea6ff" : "#aaa" }}>
                      <svg width="16" height="16" viewBox="0 0 24 24" fill={comment.liked ? "#3ea6ff" : "none"} stroke={comment.liked ? "none" : "#aaa"} strokeWidth="2">
                        <path d="M14 9V5a3 3 0 0 0-3-3l-4 9v11h11.28a2 2 0 0 0 2-1.7l1.38-9a2 2 0 0 0-2-2.3H14z"/>
                        <path d="M7 22H4a2 2 0 0 1-2-2v-7a2 2 0 0 1 2-2h3"/>
                      </svg>
                      {comment.likes > 0 && <span style={{ fontSize: 12 }}>{fmtCount(comment.likes)}</span>}
                    </button>
                    {/* Thumbs down */}
                    <button style={{ background: "none", border: "none", cursor: "pointer", padding: "4px 6px", borderRadius: 20 }}>
                      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#aaa" strokeWidth="2">
                        <path d="M10 15v4a3 3 0 0 0 3 3l4-9V2H5.72a2 2 0 0 0-2 1.7l-1.38 9a2 2 0 0 0 2 2.3H10z"/>
                        <path d="M17 2h2.67A2.31 2.31 0 0 1 22 4v7a2.31 2.31 0 0 1-2.33 2H17"/>
                      </svg>
                    </button>
                    {/* Reply */}
                    <button onClick={() => setShowReplyBox(p => ({ ...p, [comment.id]: !p[comment.id] }))} style={{ background: "none", border: "none", cursor: "pointer", padding: "4px 8px", borderRadius: 20, color: "#aaa", fontSize: 13, fontWeight: 600 }}>
                      Reply
                    </button>
                    {/* 3-dot */}
                    <button style={{ background: "none", border: "none", cursor: "pointer", padding: "4px 6px", color: "#717171", fontSize: 18, lineHeight: 1, marginLeft: "auto" }}>⋮</button>
                  </div>

                  {/* Reply input box */}
                  {showReplyBox[comment.id] && (
                    <div className="yt-reply-box" style={{ display: "flex", gap: 8, marginTop: 8, alignItems: "flex-start" }}>
                      <div style={{ width: 28, height: 28, borderRadius: "50%", background: "#ff0000", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 11, color: "#fff", fontWeight: 700, flexShrink: 0 }}>YO</div>
                      <div style={{ flex: 1 }}>
                        <input
                          value={replyInput[comment.id] || ""}
                          onChange={e => setReplyInput(p => ({ ...p, [comment.id]: e.target.value }))}
                          placeholder={`Reply to ${comment.author}...`}
                          style={{ width: "100%", background: "none", border: "none", borderBottom: "1px solid #3f3f3f", color: "#f1f1f1", fontSize: 13, padding: "5px 0", outline: "none" }}
                        />
                        <div style={{ display: "flex", justifyContent: "flex-end", gap: 8, marginTop: 8 }}>
                          <button onClick={() => setShowReplyBox(p => ({ ...p, [comment.id]: false }))} style={{ background: "none", border: "none", borderRadius: 20, padding: "6px 12px", color: "#f1f1f1", fontSize: 12, cursor: "pointer", fontWeight: 600 }}>Cancel</button>
                          <button onClick={() => submitReply(comment.id)} style={{ background: (replyInput[comment.id]||"").trim() ? "#3ea6ff" : "#3f3f3f", border: "none", borderRadius: 20, padding: "6px 14px", color: (replyInput[comment.id]||"").trim() ? "#0f0f0f" : "#717171", fontSize: 12, cursor: "pointer", fontWeight: 700 }}>Reply</button>
                        </div>
                      </div>
                    </div>
                  )}

                  {/* Replies */}
                  {comment.replies.length > 0 && (
                    <div style={{ marginTop: 8 }}>
                      <button onClick={() => setExpandedReplies(p => ({ ...p, [comment.id]: !p[comment.id] }))} style={{ background: "none", border: "none", cursor: "pointer", display: "flex", alignItems: "center", gap: 6, color: "#3ea6ff", fontSize: 13, fontWeight: 700, padding: "4px 0" }}>
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="#3ea6ff" style={{ transform: expandedReplies[comment.id] ? "rotate(180deg)" : "rotate(0deg)", transition: "transform 0.2s" }}>
                          <path d="M7 10l5 5 5-5z"/>
                        </svg>
                        {expandedReplies[comment.id] ? "Hide" : `${comment.replies.length}`} {expandedReplies[comment.id] ? "replies" : comment.replies.length === 1 ? "reply" : "replies"}
                      </button>
                      {expandedReplies[comment.id] && comment.replies.map(reply => (
                        <div key={reply.id} className="yt-comment" style={{ display: "flex", gap: 8, marginTop: 10, paddingLeft: 4 }}>
                          {/* Reply avatar — real photo or letter */}
                          <div style={{ width: 28, height: 28, borderRadius: "50%", overflow: "hidden", background: reply.color || "#555", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 11, fontWeight: 700, color: "#fff", flexShrink: 0 }}>
                            {reply.isReal && typeof reply.avatar === "string" && reply.avatar.startsWith("http")
                              ? <img src={reply.avatar} alt="" style={{ width: "100%", height: "100%", objectFit: "cover" }} onError={e => { e.target.style.display="none"; }} />
                              : (reply.avatarLetter || reply.avatar || "?")
                            }
                          </div>
                          <div style={{ flex: 1, minWidth: 0 }}>
                            <div style={{ display: "flex", alignItems: "center", gap: 6, marginBottom: 3 }}>
                              <span style={{ color: "#f1f1f1", fontSize: 13, fontWeight: 600 }}>{reply.author}</span>
                              <span style={{ color: "#717171", fontSize: 11 }}>{reply.time}</span>
                            </div>
                            <div style={{ color: "#f1f1f1", fontSize: 13, lineHeight: 1.55 }}>{reply.text}</div>
                            <div style={{ display: "flex", alignItems: "center", gap: 4, marginTop: 6 }}>
                              {/* Like reply button — functional */}
                              <button onClick={() => likeReply(comment.id, reply.id)}
                                style={{ background: "none", border: "none", cursor: "pointer", display: "flex", alignItems: "center", gap: 4, padding: "3px 6px", color: reply.liked ? "#3ea6ff" : "#aaa" }}>
                                <svg width="14" height="14" viewBox="0 0 24 24" fill={reply.liked ? "#3ea6ff" : "none"} stroke={reply.liked ? "none" : "#aaa"} strokeWidth="2">
                                  <path d="M14 9V5a3 3 0 0 0-3-3l-4 9v11h11.28a2 2 0 0 0 2-1.7l1.38-9a2 2 0 0 0-2-2.3H14z"/>
                                  <path d="M7 22H4a2 2 0 0 1-2-2v-7a2 2 0 0 1 2-2h3"/>
                                </svg>
                                {reply.likes > 0 && <span style={{ fontSize: 11 }}>{fmtCount(reply.likes)}</span>}
                              </button>
                              {/* Reply to reply */}
                              <button onClick={() => setShowReplyBox(prev => ({ ...prev, [comment.id]: true }))}
                                style={{ background: "none", border: "none", cursor: "pointer", padding: "3px 6px", color: "#aaa", fontSize: 12, fontWeight: 600 }}>Reply</button>
                            </div>
                          </div>
                        </div>
                      ))}
                    </div>
                  )}
                </div>
              </div>
            </div>
          ))}
        </div>
      )}

      {/* ══════════════════════════════════════════
          6B. RELATED VIDEOS
      ══════════════════════════════════════════ */}
      {activeChipPl === "related" && (
        <div style={{ paddingBottom: 90 }}>
          {/* Up Next header */}
          <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", padding: "12px 14px 8px" }}>
            <span style={{ color: "#f1f1f1", fontSize: 14, fontWeight: 600 }}>
              Up Next {relatedLoading && <span style={{ color: "#717171", fontSize: 12, fontWeight: 400 }}>Loading...</span>}
            </span>
            <label onClick={() => setAutoPlay && setAutoPlay(p => !p)} style={{ display: "flex", alignItems: "center", gap: 8, cursor: "pointer" }}>
              <span style={{ color: "#aaa", fontSize: 12 }}>Autoplay</span>
              <div style={{ width: 34, height: 20, borderRadius: 10, background: autoPlay ? "#3ea6ff" : "#717171", position: "relative", transition: "background 0.2s" }}>
                <div style={{ position: "absolute", top: 2, width: 16, height: 16, background: "#fff", borderRadius: "50%", transition: "left 0.2s, right 0.2s", ...(autoPlay ? { right: 2 } : { left: 2 }) }} />
              </div>
            </label>
          </div>

          {/* Loading skeleton */}
          {relatedLoading && related.length === 0 && (
            <div style={{ padding: "0 14px" }}>
              {[1,2,3,4].map(i => (
                <div key={i} style={{ display: "flex", gap: 10, marginBottom: 12 }}>
                  <div className="shimmer-bg" style={{ width: 120, height: 68, borderRadius: 8, flexShrink: 0 }} />
                  <div style={{ flex: 1 }}>
                    <div className="shimmer-bg" style={{ height: 13, borderRadius: 4, marginBottom: 6 }} />
                    <div className="shimmer-bg" style={{ height: 11, borderRadius: 4, width: "60%" }} />
                  </div>
                </div>
              ))}
            </div>
          )}

          {/* Video list */}
          {related.map((v) => (
            <div key={v.id} onClick={() => playVideo(v)}
              style={{ display: "flex", gap: 10, padding: "8px 14px", cursor: "pointer", transition: "background 0.12s",
                background: currentVideo?.id === v.id ? "#ff000010" : "transparent" }}
              onMouseEnter={e => { if (currentVideo?.id !== v.id) e.currentTarget.style.background = "#1a1a1a"; }}
              onMouseLeave={e => { e.currentTarget.style.background = currentVideo?.id === v.id ? "#ff000010" : "transparent"; }}>
              {/* Thumbnail */}
              <div style={{ position: "relative", flexShrink: 0 }}>
                <img src={v.thumb} alt="" style={{ width: 120, height: 68, borderRadius: 8, objectFit: "cover", display: "block" }} />
                {/* Duration */}
                {v.duration && (
                  <div style={{ position: "absolute", bottom: 4, right: 4, background: "#000000cc", borderRadius: 3, padding: "1px 5px", fontSize: 11, color: "#fff", fontWeight: 600 }}>
                    {parseDuration(v.duration)}
                  </div>
                )}
                {/* Playing indicator */}
                {currentVideo?.id === v.id && (
                  <div style={{ position: "absolute", inset: 0, background: "#ff000044", borderRadius: 8, display: "flex", alignItems: "center", justifyContent: "center" }}>
                    <svg width="22" height="22" viewBox="0 0 24 24" fill="#fff"><path d="M8 5v14l11-7z"/></svg>
                  </div>
                )}
              </div>
              {/* Info */}
              <div style={{ flex: 1, minWidth: 0 }}>
                <div style={{ color: "#f1f1f1", fontSize: 13, fontWeight: 500, lineHeight: 1.4, marginBottom: 3,
                  display: "-webkit-box", WebkitLineClamp: 2, WebkitBoxOrient: "vertical", overflow: "hidden" }}>{v.title}</div>
                <div style={{ color: "#aaa", fontSize: 12, marginBottom: 2 }}>{v.channel}</div>
                <div style={{ color: "#717171", fontSize: 11 }}>
                  {v.viewCount ? fmtNum(v.viewCount)+" views" : ""}
                  {v.viewCount && v.publishedAt ? " • " : ""}
                  {v.publishedAt ? relTime(v.publishedAt) : ""}
                </div>
              </div>
              {/* 3-dot */}
              <button onClick={e => { e.stopPropagation(); onAddToPlaylist(v); }}
                style={{ background: "none", border: "none", color: "#aaa", fontSize: 20, cursor: "pointer", alignSelf: "flex-start", padding: "0 2px", flexShrink: 0 }}>⋮</button>
            </div>
          ))}

          {/* Empty state */}
          {!relatedLoading && related.length === 0 && (
            <div style={{ textAlign: "center", padding: "40px 20px", color: "#555", fontSize: 13 }}>
              No related videos found
            </div>
          )}
        </div>
      )}

      {/* ══════════════════════════════════════════
          6C. CHAPTERS (mock)
      ══════════════════════════════════════════ */}
      {activeChipPl === "chapters" && (
        <div style={{ padding: "12px 14px 90px" }}>
          <div style={{ color: "#f1f1f1", fontSize: 15, fontWeight: 700, marginBottom: 12 }}>Chapters</div>
          {[
            { time: "0:00", title: "Intro" },
            { time: "0:42", title: "Verse 1" },
            { time: "1:18", title: "Chorus" },
            { time: "2:05", title: "Verse 2" },
            { time: "2:40", title: "Bridge" },
            { time: "3:15", title: "Outro" },
          ].map((ch, i) => {
            const [min, sec] = ch.time.split(":").map(Number);
            const chTime = min * 60 + sec;
            const pct = duration > 0 ? (progress >= chTime ? (i < 5 ? (progress - chTime) / ((([0,42,78,125,160,195][i+1] || duration) - chTime)) * 100 : 100) : 0) : 0;
            return (
              <div key={ch.time} onClick={() => ytRef.current?.seekTo(chTime, true)} style={{ display: "flex", alignItems: "center", gap: 12, padding: "10px 0", borderBottom: "1px solid #1a1a1a", cursor: "pointer" }}
                onMouseEnter={e => e.currentTarget.style.background = "#1a1a1a"}
                onMouseLeave={e => e.currentTarget.style.background = "transparent"}>
                <img src={video.thumb} alt="" style={{ width: 100, height: 56, borderRadius: 6, objectFit: "cover" }} />
                <div style={{ flex: 1, minWidth: 0 }}>
                  <div style={{ color: progress >= chTime ? "#fff" : "#aaa", fontSize: 14, fontWeight: progress >= chTime ? 600 : 400, marginBottom: 4 }}>{ch.title}</div>
                  <div style={{ color: progress >= chTime ? "#3ea6ff" : "#717171", fontSize: 12, fontWeight: 600 }}>{ch.time}</div>
                  {/* Chapter progress bar */}
                  <div style={{ height: 2, background: "#3f3f3f", borderRadius: 1, marginTop: 6 }}>
                    <div style={{ height: "100%", background: "#ff0000", borderRadius: 1, width: `${Math.min(100, Math.max(0, pct))}%`, transition: "width 0.3s" }} />
                  </div>
                </div>
              </div>
            );
          })}
        </div>
      )}

      <div style={{ height: 80 }} />
    </div>
  );
}

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<FloatTubeApp />);
  </script>
</body>
</html>
